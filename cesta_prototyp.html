<meta charset="utf-8">
<!--
  MOJE CESTA — PROTOTYP v0.3  (obal + registr sekcí)
  Vlož celý tento kód do HTML elementu na Mioweb stránce.
  Data se načítají z GitHub Pages (viz konstanta MC_BASE níže).

  Architektura: jeden registr SECTIONS řídí úvodní dlaždice, hamburger menu
  i router. Sekce Přerámování a Oblíbené jsou živé; ostatní jsou připravené
  sloty (kind:"placeholder"), které se dodělají výměnou rendereru — obal se
  nesahá.

  Pro běh živých sekcí musí být na GitHubu tyto soubory:
    clusters.json, feelings.json,
    reframings.json, reframing_questions.json, reframing_actions.json
-->

<div id="mc-root"><div class="mc-loading">Načítám…</div></div>

<style>
  :where(#mc-root *, #mc-root *::before, #mc-root *::after) { margin:0; box-sizing:border-box; }
  #mc-root ul { padding:0; list-style:none; }

  #mc-root {
    --bg:        #15120E;
    --surface:   #201B15;
    --surface-2: #2A241C;
    --border:    #3A332A;
    --text:      #EDE6D8;
    --body:      #DBD3C3;
    --soft:      #9A9081;
    --empty:     #34302A;
    --done:      #74955E;
    --missed:    #BC5B43;
    --accent:    #D9A441;   /* zlatá — akcent, aktivní stavy, srdíčko */
    --accent-dim:#D9A44120;

    --serif: Georgia,'Times New Roman',ui-serif,serif;
    --sans:  -apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
    --mono:  ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;

    font-family:var(--sans);
    background:var(--bg);
    color:var(--body);
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    padding-bottom:104px;
    line-height:1.55;
    font-size:16px;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }

  .mc-loading, .mc-error {
    padding:56px 24px; text-align:center; color:var(--soft); font-size:14px; line-height:1.7;
  }
  .mc-error strong { color:var(--text); font-family:var(--serif); }
  .mc-error code { color:var(--accent); font-family:var(--mono); font-size:12px; }

  /* ===== TOPBAR (obal — vždy nahoře) ===== */
  .mc-topbar {
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; background:var(--bg);
    border-bottom:1px solid var(--border);
  }
  .mc-icon-btn {
    flex-shrink:0; width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; color:var(--soft); cursor:pointer; padding:0;
    border-radius:9px; transition:color .15s ease, background .15s ease; position:relative;
  }
  .mc-icon-btn:hover { color:var(--text); background:var(--surface); }
  .mc-icon-btn svg { width:22px; height:22px; display:block; }
  .mc-topbar-title {
    flex:1; text-align:center; font-family:var(--serif); font-weight:400; font-size:20px;
    color:var(--text); letter-spacing:-0.01em; cursor:pointer; line-height:1.1;
  }
  .mc-topbar-title .mc-mark { color:var(--accent); font-style:italic; }
  .mc-heart-top.on { color:var(--accent); }
  .mc-heart-top .hf { display:none; }
  .mc-heart-top.on .he { display:none; }
  .mc-heart-top.on .hf { display:block; }
  /* badge počtu novinek na hamburgeru */
  .mc-topbadge {
    position:absolute; top:4px; right:4px; min-width:16px; height:16px; padding:0 4px;
    background:var(--accent); color:#15120E; font-family:var(--mono); font-size:10px; font-weight:700;
    border-radius:8px; display:flex; align-items:center; justify-content:center; line-height:1;
  }

  /* ===== MENU (overlay z hamburgeru) ===== */
  .mc-menu-backdrop {
    position:fixed; inset:0; z-index:40; background:#0009;
    animation:mcFade .18s ease forwards;
  }
  .mc-menu {
    position:absolute; top:0; left:0; bottom:0; width:82%; max-width:340px; z-index:41;
    background:var(--surface); border-right:1px solid var(--border);
    padding:14px 0 24px; overflow-y:auto;
    animation:mcSlide .2s cubic-bezier(.2,.7,.3,1) forwards;
  }
  .mc-menu-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 16px 14px; margin-bottom:6px; border-bottom:1px solid var(--border);
  }
  .mc-menu-head h2 { font-family:var(--serif); font-weight:400; font-size:19px; color:var(--text); }
  .mc-menu-head h2 .mc-mark { color:var(--accent); font-style:italic; }
  .mc-menu-item {
    display:flex; align-items:center; gap:13px; width:100%;
    padding:13px 16px; background:none; border:none; cursor:pointer; text-align:left;
    color:var(--body); font-family:var(--sans); font-size:15px; transition:background .12s ease;
  }
  .mc-menu-item:hover { background:var(--surface-2); }
  .mc-menu-item.active { color:var(--accent); }
  .mc-menu-item .mi-ic { flex-shrink:0; width:22px; height:22px; color:var(--soft); }
  .mc-menu-item.active .mi-ic { color:var(--accent); }
  .mc-menu-item .mi-ic svg { width:22px; height:22px; display:block; }
  .mc-menu-item .mi-label { flex:1; }
  .mc-menu-item .mi-badge {
    background:var(--accent); color:#15120E; font-family:var(--mono); font-size:10px; font-weight:700;
    padding:1px 7px; border-radius:7px;
  }
  .mc-menu-sep { height:1px; background:var(--border); margin:6px 16px; }

  /* ===== HOME (dlaždice po párech) ===== */
  .mc-home-intro { padding:22px 18px 8px; }
  .mc-home-intro h1 {
    font-family:var(--serif); font-weight:400; font-size:27px; color:var(--text);
    letter-spacing:-0.01em; line-height:1.15;
  }
  .mc-home-intro p { color:var(--soft); font-size:13.5px; margin-top:7px; }
  .mc-tiles {
    display:grid; grid-template-columns:1fr 1fr; gap:9px; padding:10px 14px 0;
  }
  .mc-tile {
    display:flex; flex-direction:column; gap:9px; min-height:118px;
    padding:16px 15px; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; cursor:pointer; text-align:left;
    transition:border-color .15s ease, transform .1s ease, background .15s ease; position:relative;
  }
  .mc-tile:hover { border-color:var(--accent); background:var(--surface-2); }
  .mc-tile:active { transform:scale(.985); }
  .mc-tile-ic { color:var(--accent); width:26px; height:26px; }
  .mc-tile-ic svg { width:26px; height:26px; display:block; }
  .mc-tile-name {
    margin-top:auto; font-family:var(--serif); font-size:17px; color:var(--text); line-height:1.2;
  }
  .mc-tile-badge {
    position:absolute; top:12px; right:12px; min-width:18px; height:18px; padding:0 5px;
    background:var(--accent); color:#15120E; font-family:var(--mono); font-size:10px; font-weight:700;
    border-radius:9px; display:flex; align-items:center; justify-content:center;
  }

  /* ===== PLACEHOLDER (připravený slot) ===== */
  .mc-slot {
    text-align:center; padding:64px 34px; color:var(--soft); line-height:1.7;
  }
  .mc-slot .s-ic { color:var(--accent); opacity:.5; margin-bottom:16px; }
  .mc-slot .s-ic svg { width:40px; height:40px; }
  .mc-slot h2 { font-family:var(--serif); font-weight:400; font-size:22px; color:var(--text); margin-bottom:8px; }
  .mc-slot p { font-size:14px; }

  /* ===== SECTION HEADER (nadpis sekce v těle) ===== */
  .mc-sec-head { padding:20px 18px 2px; }
  .mc-sec-head h1 {
    font-family:var(--serif); font-weight:400; font-size:26px; color:var(--text);
    letter-spacing:-0.01em; line-height:1.15;
  }
  .mc-sec-head p { color:var(--soft); font-size:13px; margin-top:6px; }

  /* ===== SEARCH ===== */
  .mc-search-wrap { padding:14px 18px 2px; position:relative; }
  .mc-search {
    width:100%; padding:11px 14px 11px 40px; font-family:var(--serif); font-size:16px;
    color:var(--text); background:var(--bg); border:1px solid var(--border);
    border-radius:10px; outline:none; transition:border-color .15s ease;
  }
  .mc-search::placeholder { color:var(--soft); font-style:italic; }
  .mc-search:focus { border-color:var(--accent); }
  .mc-search-icon {
    position:absolute; left:32px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; color:var(--soft); pointer-events:none;
  }
  .mc-count-pill {
    position:absolute; right:30px; top:50%; transform:translateY(-50%);
    background:var(--surface-2); color:var(--soft); font-family:var(--mono); font-size:11px; font-weight:600;
    padding:3px 9px; border-radius:6px; pointer-events:none;
  }

  /* ===== FEELING LIST ===== */
  .mc-list { padding:8px 18px 0; list-style:none; }
  .mc-feeling {
    display:flex; align-items:center; gap:11px;
    padding:10px 12px 10px 14px; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; margin-bottom:5px; transition:border-color .15s ease, background .15s ease;
  }
  .mc-feeling.checked { border-color:var(--accent); background:var(--accent-dim); }
  .mc-check {
    flex-shrink:0; width:24px; height:24px; border-radius:7px;
    border:1px solid var(--border); background:var(--surface-2); color:var(--soft); cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .12s ease;
  }
  .mc-check.on { background:var(--accent); border-color:var(--accent); }
  .mc-check svg { width:14px; height:14px; color:#15120E; opacity:0; transition:opacity .12s ease; }
  .mc-check.on svg { opacity:1; }
  .mc-check:active { transform:scale(.92); }
  .mc-feeling-name { flex:1; font-family:var(--serif); font-size:16px; line-height:1.25; color:var(--text); cursor:pointer; }
  .mc-feeling-go { font-family:var(--mono); color:var(--soft); font-size:18px; opacity:.5; cursor:pointer; padding:0 2px; }
  .mc-feeling-name:hover ~ .mc-feeling-go, .mc-feeling-go:hover { opacity:.9; color:var(--accent); }

  .mc-more {
    width:100%; margin:5px 0 4px; padding:11px; background:transparent;
    border:1px dashed var(--border); border-radius:8px;
    color:var(--soft); font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s ease;
  }
  .mc-more:hover { color:var(--text); border-color:var(--soft); }

  /* ===== FLOATING ACTION ===== */
  .mc-fab-wrap {
    position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center;
    padding:16px 18px calc(16px + env(safe-area-inset-bottom));
    pointer-events:none;
    background:linear-gradient(to top, var(--bg) 58%, transparent);
  }
  .mc-fab {
    pointer-events:auto; max-width:484px; width:100%;
    background:var(--accent); color:#15120E; border:none; border-radius:12px;
    padding:14px; font-family:var(--sans); font-size:15px; font-weight:700; cursor:pointer;
    transition:transform .12s ease, filter .15s ease;
  }
  .mc-fab:hover { filter:brightness(1.06); }
  .mc-fab:active { transform:scale(.98); }

  /* ===== DETAIL ===== */
  .mc-back {
    display:inline-flex; align-items:center; gap:5px; margin:18px 18px 0;
    background:none; border:none; padding:0; color:var(--accent); font-family:var(--sans);
    font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s ease;
  }
  .mc-back:hover { opacity:.7; }
  .mc-detail-title {
    font-family:var(--serif); font-weight:400; font-size:26px; color:var(--text);
    padding:14px 18px 2px; letter-spacing:-0.01em; line-height:1.15;
  }
  .mc-detail-sub { padding:0 18px 2px; color:var(--soft); font-family:var(--mono); font-size:12px; }

  .mc-submenu { display:flex; gap:6px; padding:14px 18px 4px; flex-wrap:wrap; }
  .mc-submenu button {
    background:var(--surface); border:1px solid var(--border); color:var(--soft);
    font-family:var(--sans); font-size:13px; font-weight:600; padding:7px 14px;
    border-radius:8px; cursor:pointer; transition:all .15s ease;
  }
  .mc-submenu button:hover { color:var(--text); }
  .mc-submenu button.active { background:var(--accent); border-color:var(--accent); color:#15120E; }

  /* ===== CONTENT CARDS ===== */
  .mc-cards { padding:6px 18px 0; list-style:none; }
  .mc-card {
    position:relative; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:16px 48px 16px 18px; margin-bottom:7px;
    overflow:hidden;
  }
  .mc-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--accent); opacity:.7;
  }
  .mc-card-text { font-family:var(--serif); font-size:16.5px; line-height:1.6; color:var(--text); }
  .mc-card-meta { margin-top:9px; font-family:var(--mono); font-size:11px; color:var(--soft); }

  .mc-heart {
    position:absolute; top:12px; right:11px; background:none; border:none;
    cursor:pointer; padding:5px; transition:transform .12s ease;
  }
  .mc-heart:active { transform:scale(.9); }
  .mc-heart svg { width:22px; height:22px; display:block; transition:all .12s ease; }
  .mc-heart .he { color:#4a4338; }
  .mc-heart .hf { color:var(--accent); display:none; }
  .mc-heart.on .he { display:none; }
  .mc-heart.on .hf { display:block; }

  /* ===== MARKDOWN BODY ===== */
  .mc-md { font-family:var(--serif); font-size:16.5px; line-height:1.65; color:var(--body); }
  .mc-md h2, .mc-md h3, .mc-md h4 {
    font-family:var(--serif); font-weight:400; color:var(--text);
    line-height:1.25; letter-spacing:-0.01em;
  }
  .mc-md h2 { font-size:21px; margin:26px 0 8px; }
  .mc-md h3 { font-size:17.5px; margin:22px 0 6px; color:var(--accent); }
  .mc-md h4 { font-size:15px; margin:18px 0 5px; font-family:var(--sans); font-weight:700; }
  .mc-md > :first-child { margin-top:0; }
  .mc-md p { margin:0 0 13px; }
  .mc-md ul, .mc-md ol { margin:0 0 14px; padding-left:22px; }
  .mc-md ul { list-style:disc; }
  .mc-md ol { list-style:decimal; }
  .mc-md li { margin-bottom:6px; padding-left:3px; }
  .mc-md ol > li { margin-bottom:14px; }
  .mc-md li > ul, .mc-md li > ol { margin:7px 0 0; }
  .mc-md li > ul { list-style:circle; }
  .mc-md li::marker { color:var(--accent); }
  .mc-md strong { color:var(--text); font-weight:700; }
  .mc-md em { color:var(--soft); font-style:italic; }

  /* ===== FAVORITES ===== */
  .mc-fav-group { padding:6px 18px 0; }
  .mc-fav-group h2 {
    font-family:var(--serif); font-size:18px; font-weight:400; color:var(--text);
    margin:18px 0 8px; display:flex; align-items:center; gap:8px;
  }
  .mc-fav-group h2 .c { color:var(--soft); font-family:var(--mono); font-weight:600; font-size:12px; }
  .mc-empty { text-align:center; padding:60px 32px; color:var(--soft); line-height:1.7; font-size:14px; }
  .mc-empty .e-ic { font-size:34px; opacity:.4; margin-bottom:12px; }

  .mc-more-page {
    width:calc(100% - 36px); margin:4px 18px 0; padding:12px; background:var(--surface);
    border:1px solid var(--border); border-radius:8px; color:var(--text);
    font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:border-color .15s ease;
  }
  .mc-more-page:hover { border-color:var(--accent); }

  @keyframes mcIn { from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }
  .mc-in { animation:mcIn .2s ease forwards; }
  @keyframes mcFade { from{opacity:0;} to{opacity:1;} }
  @keyframes mcSlide { from{transform:translateX(-100%);} to{transform:translateX(0);} }
</style>

<script>
(function(){
  "use strict";

  // ===================== KONFIGURACE =====================
  var MC_BASE = "https://haryzek.github.io/cesta/";
  var FILES = {
    clusters:  "clusters.json",
    feelings:  "feelings.json",
    reframings:"reframings.json",
    questions: "reframing_questions.json",
    actions:   "reframing_actions.json"
  };
  var TYPES = [
    { key:"reframings", store:"reframings",          label:"Přerámování" },
    { key:"questions",  store:"reframing_questions",  label:"Otázky" },
    { key:"actions",    store:"reframing_actions",    label:"Úkoly" }
  ];
  // Všechna uživatelská data pod jedním klíčem, verzovaně.
  var STORE_KEY = "mc_user_v1";
  // Kategorie oblíbených = názvy datových typů (dle README).
  var FAV_STORES = ["crisis","body","articles","exercises",
                    "reframings","reframing_questions","reframing_actions",
                    "inspirations","questions"];

  // ===================== IKONY (inline SVG, stroke=currentColor) =====================
  var IC = {
    crisis:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3z"/><path d="M12 8v4M12 16h.01"/></svg>',
    body:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5.5 5.5 0 0 0-8.8-1.4 5.5 5.5 0 0 0-8.8 6.6C4.8 13.5 12 20 12 20s7.2-6.5 8.8-9.2a5.5 5.5 0 0 0 0-5.2z"/></svg>',
    reframing:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>',
    exercises:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.2"/><path d="M12 8v6M8 22l4-8 4 8M6 11h12"/></svg>',
    questions:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>',
    inspirations:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5 3.6 3.6M20.4 20.4 19 19M19 5l1.4-1.4M3.6 20.4 5 19"/><circle cx="12" cy="12" r="4"/></svg>',
    articles:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2V4z"/><path d="M8 8h7M8 12h7M8 16h4"/></svg>',
    about:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
    favorites:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>'
  };

  // ===================== REGISTR SEKCÍ =====================
  // Jeden zdroj pravdy: řídí úvodní dlaždice, hamburger menu i router.
  // kind: "reframing" (živé) | "favorites" (živé) | "placeholder" (slot).
  // Pořadí dlaždic dle README: dvojice řádků. Oblíbené nejsou dlaždice —
  // vstup je srdíčko v hlavičce (tile:false).
  var SECTIONS = [
    { key:"crisis",       label:"První pomoc",      icon:"crisis",       kind:"placeholder", tile:true },
    { key:"body",         label:"Tělesné příznaky", icon:"body",         kind:"placeholder", tile:true },
    { key:"reframing",    label:"Přerámování",      icon:"reframing",    kind:"reframing",   tile:true },
    { key:"exercises",    label:"Cvičení",          icon:"exercises",    kind:"placeholder", tile:true },
    { key:"questions",    label:"Otázky",           icon:"questions",    kind:"placeholder", tile:true },
    { key:"inspirations", label:"Inspirace",        icon:"inspirations", kind:"placeholder", tile:true },
    { key:"articles",     label:"Články",           icon:"articles",     kind:"placeholder", tile:true },
    { key:"about",        label:"O appce",          icon:"about",        kind:"placeholder", tile:true },
    { key:"favorites",    label:"Oblíbené",         icon:"favorites",    kind:"favorites",   tile:false }
  ];
  function sectionByKey(k){ for(var i=0;i<SECTIONS.length;i++){ if(SECTIONS[i].key===k) return SECTIONS[i]; } return null; }

  // ===================== STAV =====================
  var DB = null;             // načtená data
  var clusterName = {};      // cluster_id -> name
  var clusterSort = {};      // cluster_id -> sort_order
  var byCluster = {};        // typeKey -> { cluster_id -> [items sorted] }
  var itemIndex = {};        // typeKey -> { id -> item }
  var contentClusters = [];  // cluster_id, které mají přerámování

  var state = {
    page: "home",            // "home" | "section" | "favorites"
    section: null,           // klíč aktivní sekce (kind řídí renderer)
    menuOpen: false,
    // --- podstav sekce Přerámování ---
    rf: {
      view: "feelings",      // "feelings" | "detail"
      showSecondary: false,
      selected: {},          // feel_id -> feeling obj
      detailClusters: [],    // [{cluster_id, count}]
      detailMode: "single",  // "single" | "merged"
      activeType: "reframings",
      search: "",
      pageLimit: 50
    }
  };

  // ===================== UŽIVATELSKÁ DATA (localStorage) =====================
  // { favorites: {store: [id]}, read: [id], last_seen: {kat: iso}, profile: {schema: váha} }
  var USER = loadUser();

  function emptyUser(){
    var u={ favorites:{}, read:[], last_seen:{}, profile:{} };
    FAV_STORES.forEach(function(s){ u.favorites[s]=[]; });
    return u;
  }
  function loadUser(){
    var u=emptyUser();
    try {
      var d=JSON.parse(localStorage.getItem(STORE_KEY));
      if(d && typeof d==="object"){
        FAV_STORES.forEach(function(s){
          if(Array.isArray(d.favorites&&d.favorites[s])) u.favorites[s]=d.favorites[s];
        });
        if(Array.isArray(d.read)) u.read=d.read;
        if(d.last_seen && typeof d.last_seen==="object") u.last_seen=d.last_seen;
        if(d.profile && typeof d.profile==="object") u.profile=d.profile;
      }
    } catch(e){}
    return u;
  }
  function saveUser(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(USER)); }catch(e){} }

  function favCount(){
    return FAV_STORES.reduce(function(n,s){ return n + USER.favorites[s].length; }, 0);
  }
  function isFav(store,id){ return USER.favorites[store].indexOf(id) > -1; }
  function toggleFav(store,id){
    var arr=USER.favorites[store], i=arr.indexOf(id);
    if(i>-1) arr.splice(i,1); else arr.push(id);
    saveUser();
  }
  // Placeholder pro badge novinek — až budou sloty živé, dopočítá se z added_at
  // proti last_seen. Zatím vrací 0 (nic se nezobrazí).
  function newsCount(/*sectionKey*/){ return 0; }
  function newsTotal(){ return 0; }

  // ===================== NAČTENÍ DAT =====================
  function load(){
    var keys=Object.keys(FILES);
    Promise.all(keys.map(function(k){
      return fetch(MC_BASE+FILES[k], {cache:"no-cache"}).then(function(r){
        if(!r.ok) throw new Error(FILES[k]+" → HTTP "+r.status);
        return r.json();
      });
    })).then(function(arrs){
      DB={};
      keys.forEach(function(k,i){ DB[k]=arrs[i]; });
      prepare();
      render();
    }).catch(function(err){
      showError(err);
    });
  }

  function prepare(){
    DB.clusters.forEach(function(c){ clusterName[c.id]=c.name; clusterSort[c.id]=c.sort_order; });

    TYPES.forEach(function(t){
      byCluster[t.key]={}; itemIndex[t.key]={};
      (DB[t.key]||[]).forEach(function(it){
        (byCluster[t.key][it.cluster_id] = byCluster[t.key][it.cluster_id]||[]).push(it);
        itemIndex[t.key][it.id]=it;
      });
      Object.keys(byCluster[t.key]).forEach(function(cid){
        byCluster[t.key][cid].sort(function(a,b){ return a.sort_order-b.sort_order; });
      });
    });

    // clustery, které reálně mají přerámování (jen ty pustíme do seznamu pocitů)
    contentClusters = Object.keys(byCluster.reframings);
  }

  function showError(err){
    var root=document.getElementById("mc-root");
    root.innerHTML =
      '<div class="mc-error"><strong>Data se nepodařilo načíst.</strong><br><br>'+
      'Zkontroluj, že na GitHub Pages leží soubory:<br>'+
      '<code>clusters.json, feelings.json, reframings.json, reframing_questions.json, reframing_actions.json</code><br><br>'+
      'na adrese <code>'+MC_BASE+'</code><br><br>'+
      '<span style="opacity:.6">Detail: '+esc(String(err&&err.message||err))+'</span></div>';
  }

  // ===================== POMOCNÉ =====================
  function esc(s){ var d=document.createElement("div"); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
  function deburr(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

  // ===================== MARKDOWN =====================
  // Podmnožina, kterou reálně používá obsah: nadpisy, odrážky, číslované
  // seznamy, tučné, kurzíva, odstavce. Vstup se escapuje jako první, takže
  // do výstupu se nedostane žádné HTML z dat.
  function mdInline(s){
    return esc(s)
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  }
  function md(src){
    var lines=String(src||"").split(/\r?\n/), out=[], para=[];
    var stack=[];   // otevřené seznamy: {tag, indent}; každý má právě jedno otevřené <li>

    function flushPara(){ if(para.length){ out.push("<p>"+para.map(mdInline).join("<br>")+"</p>"); para=[]; } }
    function closeList(){ out.push("</li></"+stack.pop().tag+">"); }
    function closeLists(){ while(stack.length) closeList(); }

    function item(indent, tag, text){
      flushPara();
      while(stack.length && indent < stack[stack.length-1].indent) closeList();
      var top=stack[stack.length-1];
      if(!stack.length || indent > top.indent){
        out.push("<"+tag+">"); stack.push({tag:tag, indent:indent});
      } else {
        out.push("</li>");
        if(top.tag!==tag){ out.push("</"+stack.pop().tag+">"); out.push("<"+tag+">"); stack.push({tag:tag, indent:indent}); }
      }
      out.push("<li>"+text);
    }

    lines.forEach(function(raw){
      var line=raw.replace(/\t/g,"    "), m;
      var indent=line.match(/^ */)[0].length;
      line=line.trim();

      if(!line){ flushPara(); return; }

      if((m=line.match(/^(#{1,6})\s+(.*)$/))){
        flushPara(); closeLists();
        var lvl=Math.min(Math.max(m[1].length, 2), 4);
        out.push("<h"+lvl+">"+mdInline(m[2])+"</h"+lvl+">");
        return;
      }
      if((m=line.match(/^[-*]\s+(.*)$/)))   { item(indent, "ul", mdInline(m[1])); return; }
      if((m=line.match(/^\d+[.)]\s+(.*)$/))){ item(indent, "ol", mdInline(m[1])); return; }

      closeLists();
      para.push(line);
    });
    flushPara(); closeLists();
    return out.join("");
  }

  // ===================== PŘERÁMOVÁNÍ — pocity =====================
  function mainFeelings(){
    return DB.feelings.filter(function(f){
      return contentClusters.indexOf(f.cluster_id)>-1 && f.main && f.main!=="0";
    });
  }
  function secondaryFeelings(){
    return DB.feelings.filter(function(f){
      return contentClusters.indexOf(f.cluster_id)>-1 && (!f.main || f.main==="0");
    });
  }
  function visibleFeelings(){
    var rf=state.rf;
    var list = mainFeelings().concat(rf.showSecondary ? secondaryFeelings() : []);
    if(rf.search.trim()){
      list = mainFeelings().concat(secondaryFeelings());
      var q=deburr(rf.search);
      list=list.filter(function(f){ return deburr(f.name).indexOf(q)>-1; });
    }
    list.sort(function(a,b){ return a.sort_order-b.sort_order; });
    return list;
  }

  // ===================== INTERLEAVING (merged) =====================
  // přesně dle README: kola, kvóta = počet vybraných pocitů v clusteru
  function interleave(typeKey, clustersWithCounts){
    var counts={}, ids=[];
    clustersWithCounts.forEach(function(c){ counts[c.cluster_id]=c.count; ids.push(c.cluster_id); });
    ids.sort(function(a,b){
      if(counts[b]!==counts[a]) return counts[b]-counts[a];     // víc vybraných pocitů nahoru
      return (clusterSort[a]||0)-(clusterSort[b]||0);           // remíza: sort_order clusteru
    });
    var lists={}, pos={};
    ids.forEach(function(cid){ lists[cid]=byCluster[typeKey][cid]||[]; pos[cid]=0; });
    var seen={}, merged=[];
    function exhausted(){ return ids.every(function(cid){ return pos[cid]>=lists[cid].length; }); }
    while(!exhausted()){
      ids.forEach(function(cid){
        var emitted=0;
        while(emitted<counts[cid] && pos[cid]<lists[cid].length){
          var it=lists[cid][pos[cid]]; pos[cid]++;
          if(seen[it.id]) continue;          // dedup (pojistka), nečerpá kvótu
          seen[it.id]=1; merged.push(it); emitted++;
        }
      });
    }
    return merged;
  }

  function currentList(){
    var rf=state.rf;
    if(rf.detailMode==="single"){
      var cid=rf.detailClusters[0].cluster_id;
      return (byCluster[rf.activeType][cid]||[]).slice();
    }
    return interleave(rf.activeType, rf.detailClusters);
  }

  // ===================== RENDER — obal =====================
  function render(){
    var root=document.getElementById("mc-root");
    var h="";

    h+=viewTopbar();

    if(state.page==="home")            h+=viewHome();
    else if(state.page==="favorites")  h+=viewFavorites();
    else {
      var sec=sectionByKey(state.section);
      if(sec && sec.kind==="reframing")      h+=viewReframing();
      else if(sec && sec.kind==="favorites") h+=viewFavorites();
      else                                   h+=viewPlaceholder(sec);
    }

    if(state.menuOpen) h+=viewMenu();

    root.innerHTML=h;

    // po překreslení obnov hodnotu search inputu (Přerámování / pocity)
    var s=document.getElementById("mc-search");
    if(s && state.rf.search){ s.value=state.rf.search; }
  }

  function viewTopbar(){
    var favOn=favCount()>0;
    var nt=newsTotal();
    var h='<div class="mc-topbar">';
    // hamburger + badge novinek
    h+='<button class="mc-icon-btn" onclick="MC.menu(true)" aria-label="Menu">'+
       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'+
       (nt>0?'<span class="mc-topbadge">'+nt+'</span>':'')+'</button>';
    // název (klik = domů)
    h+='<div class="mc-topbar-title" onclick="MC.home()">Moje <span class="mc-mark">cesta</span></div>';
    // srdíčko = vstup do Oblíbených
    h+='<button class="mc-icon-btn mc-heart-top '+(favOn?"on":"")+' '+(state.page==="favorites"?"active":"")+'" onclick="MC.open(\'favorites\')" aria-label="Oblíbené">'+
       '<svg class="he" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>'+
       '<svg class="hf" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>';
    h+='</div>';
    return h;
  }

  // ===================== RENDER — menu =====================
  function viewMenu(){
    var h='<div class="mc-menu-backdrop" onclick="MC.menu(false)"></div>';
    h+='<nav class="mc-menu">';
    h+='<div class="mc-menu-head"><h2>Moje <span class="mc-mark">cesta</span></h2>'+
       '<button class="mc-icon-btn" onclick="MC.menu(false)" aria-label="Zavřít">'+
       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>';

    SECTIONS.filter(function(s){ return s.tile; }).forEach(function(s){
      var active = state.page==="section" && state.section===s.key;
      var n=newsCount(s.key);
      h+='<button class="mc-menu-item '+(active?"active":"")+'" onclick="MC.open(\''+s.key+'\')">'+
         '<span class="mi-ic">'+IC[s.icon]+'</span>'+
         '<span class="mi-label">'+esc(s.label)+'</span>'+
         (n>0?'<span class="mi-badge">'+n+'</span>':'')+'</button>';
    });

    h+='<div class="mc-menu-sep"></div>';
    var fav=sectionByKey("favorites");
    h+='<button class="mc-menu-item '+(state.page==="favorites"?"active":"")+'" onclick="MC.open(\'favorites\')">'+
       '<span class="mi-ic">'+IC[fav.icon]+'</span>'+
       '<span class="mi-label">'+esc(fav.label)+'</span>'+
       (favCount()>0?'<span class="mi-badge">'+favCount()+'</span>':'')+'</button>';

    h+='</nav>';
    return h;
  }

  // ===================== RENDER — home (dlaždice) =====================
  function viewHome(){
    var h='<div class="mc-home-intro"><h1>Vítej na cestě.</h1>'+
          '<p>Vyber, kudy dnes — a podívej se na to, co prožíváš, jinak.</p></div>';
    h+='<div class="mc-tiles">';
    SECTIONS.filter(function(s){ return s.tile; }).forEach(function(s){
      var n=newsCount(s.key);
      h+='<button class="mc-tile mc-in" onclick="MC.open(\''+s.key+'\')">'+
         '<span class="mc-tile-ic">'+IC[s.icon]+'</span>'+
         '<span class="mc-tile-name">'+esc(s.label)+'</span>'+
         (n>0?'<span class="mc-tile-badge">'+n+'</span>':'')+'</button>';
    });
    h+='</div>';
    return h;
  }

  // ===================== RENDER — placeholder slot =====================
  function viewPlaceholder(sec){
    var h='<button class="mc-back" onclick="MC.home()">← Domů</button>';
    h+='<div class="mc-slot"><div class="s-ic">'+(sec?IC[sec.icon]:"")+'</div>'+
       '<h2>'+esc(sec?sec.label:"")+'</h2>'+
       '<p>Tahle sekce se připravuje.<br>Brzy tu bude co objevovat.</p></div>';
    return h;
  }

  // ===================== RENDER — Přerámování =====================
  function viewReframing(){
    return state.rf.view==="detail" ? viewRfDetail() : viewRfFeelings();
  }

  function viewRfFeelings(){
    var rf=state.rf;
    var feelings=visibleFeelings();
    var total=mainFeelings().length+secondaryFeelings().length;
    var h='<div class="mc-sec-head"><h1>Přerámování</h1>'+
          '<p>Vyber, jak se cítíš — a podívej se na to jinak.</p></div>';

    h+='<div class="mc-search-wrap">';
    h+='<svg class="mc-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    h+='<input id="mc-search" class="mc-search" placeholder="Hledej pocit…" oninput="MC.rfSearch(this.value)">';
    h+='<span class="mc-count-pill">'+total+' pocitů</span>';
    h+='</div>';

    h+='<ul class="mc-list">';
    if(feelings.length===0){
      h+='<div class="mc-empty">Žádný pocit neodpovídá hledání.</div>';
    } else {
      feelings.forEach(function(f){
        var on=!!rf.selected[f.id];
        h+='<li class="mc-feeling mc-in '+(on?"checked":"")+'">';
        h+='<span class="mc-check '+(on?"on":"")+'" onclick="MC.rfToggle(\''+f.id+'\')">'+
           '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>';
        h+='<span class="mc-feeling-name" onclick="MC.rfSingle(\''+f.cluster_id+'\')">'+esc(f.name)+'</span>';
        h+='<span class="mc-feeling-go" onclick="MC.rfSingle(\''+f.cluster_id+'\')">›</span>';
        h+='</li>';
      });
    }
    h+='</ul>';

    if(!rf.search.trim() && !rf.showSecondary && secondaryFeelings().length>0){
      h+='<button class="mc-more" onclick="MC.rfSecondary()">Další pocity ('+secondaryFeelings().length+')</button>';
    }

    var n=Object.keys(rf.selected).length;
    if(n>0){
      h+='<div class="mc-fab-wrap"><button class="mc-fab" onclick="MC.rfOpenSelected()">'+
         (n===1?"Zobrazit přerámování":"Zobrazit přerámování ("+n+" pocitů)")+'</button></div>';
    }
    return h;
  }

  function viewRfDetail(){
    var rf=state.rf;
    var h='<button class="mc-back" onclick="MC.rfBack()">← Zpět na pocity</button>';

    if(rf.detailMode==="single"){
      h+='<div class="mc-detail-title">'+esc(clusterName[rf.detailClusters[0].cluster_id]||"")+'</div>';
    } else {
      var names=rf.detailClusters.map(function(c){ return clusterName[c.cluster_id]; });
      h+='<div class="mc-detail-title">Vybrané pocity</div>';
      h+='<div class="mc-detail-sub">'+esc(names.join(" · "))+'</div>';
    }

    h+='<div class="mc-submenu">';
    TYPES.forEach(function(t){
      h+='<button class="'+(rf.activeType===t.key?"active":"")+'" onclick="MC.rfType(\''+t.key+'\')">'+t.label+'</button>';
    });
    h+='</div>';

    var list=currentList();
    var store=storeOf(rf.activeType);
    var shown=list.slice(0, rf.pageLimit);

    h+='<ul class="mc-cards">';
    shown.forEach(function(it){
      var on=isFav(store,it.id);
      h+='<li class="mc-card mc-in">';
      h+='<div class="mc-card-text">'+esc(it.text)+'</div>';
      if(rf.detailMode==="merged"){
        h+='<div class="mc-card-meta">'+esc(clusterName[it.cluster_id]||"")+'</div>';
      }
      h+=heartBtn(store,it.id,on);
      h+='</li>';
    });
    h+='</ul>';

    if(list.length>rf.pageLimit){
      h+='<button class="mc-more-page" onclick="MC.rfMore()">Dalších '+
         Math.min(50, list.length-rf.pageLimit)+'</button>';
    }
    return h;
  }

  // ===================== RENDER — Oblíbené =====================
  function viewFavorites(){
    var h='<div class="mc-sec-head"><h1>Oblíbené</h1></div>';
    if(favCount()===0){
      return h+'<div class="mc-empty"><div class="e-ic">♡</div>'+
             'Zatím tu nic není.<br>Klepni na srdíčko u věty, která tě osloví, a najdeš ji tady.</div>';
    }
    TYPES.forEach(function(t){
      // tichý zmizák: položky, které už v datech nejsou, se přeskočí a nepočítají
      var items=USER.favorites[t.store].slice().reverse()
                    .map(function(id){ return itemIndex[t.key][id]; })
                    .filter(Boolean);
      if(items.length===0) return;
      h+='<div class="mc-fav-group"><h2>'+t.label+' <span class="c">'+items.length+'</span></h2>';
      h+='<ul class="mc-cards" style="padding-left:0;padding-right:0">';
      items.forEach(function(it){
        h+='<li class="mc-card mc-in">';
        h+='<div class="mc-card-text">'+esc(it.text)+'</div>';
        h+='<div class="mc-card-meta">'+esc(clusterName[it.cluster_id]||"")+'</div>';
        h+=heartBtn(t.store,it.id,true);
        h+='</li>';
      });
      h+='</ul></div>';
    });
    return h;
  }

  function heartBtn(store,id,on){
    return '<button class="mc-heart '+(on?"on":"")+'" onclick="MC.fav(\''+store+'\',\''+id+'\')" aria-label="Uložit do oblíbených">'+
      '<svg class="he" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>'+
      '<svg class="hf" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>';
  }

  function storeOf(typeKey){ for(var i=0;i<TYPES.length;i++){ if(TYPES[i].key===typeKey) return TYPES[i].store; } }

  // ===================== HANDLERY =====================
  window.MC = {
    // --- obal ---
    menu:function(open){ state.menuOpen=!!open; render(); },
    home:function(){ state.page="home"; state.section=null; state.menuOpen=false; scrollTop(); render(); },
    open:function(key){
      state.menuOpen=false;
      if(key==="favorites"){ state.page="favorites"; state.section=null; }
      else {
        state.page="section"; state.section=key;
        // vstup do sekce = její výchozí pohled; výběr pocitů se drží (README),
        // ale přistává se na seznamu pocitů, ne v posledním detailu
        if(key==="reframing") state.rf.view="feelings";
      }
      scrollTop(); render();
    },
    // --- Přerámování ---
    rfSearch:function(v){
      state.rf.search=v; render();
      var s=document.getElementById("mc-search");
      if(s){ s.focus(); s.value=v; s.setSelectionRange(v.length,v.length); }
    },
    rfSecondary:function(){ state.rf.showSecondary=!state.rf.showSecondary; render(); },
    rfToggle:function(id){
      var sel=state.rf.selected;
      if(sel[id]) delete sel[id];
      else {
        var f=DB.feelings.filter(function(x){return x.id===id;})[0];
        if(f) sel[id]=f;
      }
      render();
    },
    rfSingle:function(clusterId){
      state.rf.detailMode="single";
      state.rf.detailClusters=[{cluster_id:clusterId, count:1}];
      enterRfDetail();
    },
    rfOpenSelected:function(){
      var sel=state.rf.selected;
      var feels=Object.keys(sel).map(function(k){return sel[k];});
      var counts={};
      feels.forEach(function(f){ counts[f.cluster_id]=(counts[f.cluster_id]||0)+1; });
      var cids=Object.keys(counts);
      if(cids.length===1){
        state.rf.detailMode="single";
        state.rf.detailClusters=[{cluster_id:cids[0], count:counts[cids[0]]}];
      } else {
        state.rf.detailMode="merged";
        state.rf.detailClusters=cids.map(function(c){ return {cluster_id:c, count:counts[c]}; });
      }
      enterRfDetail();
    },
    rfBack:function(){ state.rf.view="feelings"; scrollTop(); render(); },
    rfType:function(t){ state.rf.activeType=t; state.rf.pageLimit=50; scrollTop(); render(); },
    rfMore:function(){ state.rf.pageLimit+=50; render(); },
    // --- oblíbené ---
    fav:function(store,id){ toggleFav(store,id); render(); }
  };

  function enterRfDetail(){ state.rf.view="detail"; state.rf.activeType="reframings"; state.rf.pageLimit=50; scrollTop(); render(); }
  function scrollTop(){
    var r=document.getElementById("mc-root");
    if(r && r.scrollIntoView) r.scrollIntoView({behavior:"smooth", block:"start"});
  }

  // ===================== START =====================
  load();
})();
</script>
