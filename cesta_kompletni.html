<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="theme-color" content="#15120E">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Moje cesta</title>
<!--
  MOJE CESTA — KOMPLETNÍ PROTOTYP
  Všech 11 JSON sekcí naživo. Hřiště k proklikání celé appky.

  Data se tahají relativně (MC_BASE="./data/"), takže soubor funguje lokálně
  (python -m http.server v kořeni) i na GitHub Pages.
  Obal + registr sekcí je převzatý z cesta_prototyp.html; sloty jsou tu
  nahrazené živými renderery.

  Meta tagy nahoře jsou pro samostatné spuštění na mobilu (PWA přes
  „Přidat na plochu" + vypnutá cache, ať se refresh po pushi projeví hned).
  Uvnitř Miowebu je WordPress ignoruje, nevadí tam.
-->

<div id="mc-root"><div class="mc-loading">Načítám…</div></div>

<style>
  :where(#mc-root *, #mc-root *::before, #mc-root *::after) { margin:0; box-sizing:border-box; }
  /* Pozor na specificitu: `#mc-root ul` (0,1,1) přebíjí třídy (0,1,0), takže
     každé .mc-list/.mc-cards/.mc-md ul tiše přišlo o vlastní padding a leželo
     na okraji obrazovky. Reset proto přes :where() — nulová specificita. */
  :where(#mc-root ul) { padding:0; list-style:none; }

  /* ===== PALETA =====
     Dvě sady, přepínač píše data-theme na #mc-root (ne na <html> — uvnitř
     Miowebu nad ním nemáme kontrolu). Dark je zapsaný jako výchozí přímo na
     #mc-root, aby appka měla barvy i kdyby JS nedoběhl.

     Mapování starých názvů na nový design systém:
       --bg → bg | --surface → card | --surface-2 → card-alt | --text → text
       --body → text (oba jsou čtený text, nová paleta je sjednocuje)
       --soft → text-secondary | --accent-dim → accent-soft
     Nové: --muted (nejtlumenější), --teal + --teal-soft (tag pilulky),
     --on-accent (text NA accent ploše — v dark tmavý, v light světlý; dřív
     bylo natvrdo #15120E, což by na světlé terakotě nebylo vidět). */
  #mc-root {
    --bg:#1C1914; --surface:#262119; --surface-2:#2E281E; --border:#3A3226;
    --text:#F2EBDC; --body:#F2EBDC; --soft:#B5AA96; --muted:#7C7264;
    --accent:#E08252; --accent-dim:#3D2A1F; --on-accent:#1C1914;
    --teal:#6FBBA6; --teal-soft:#223832; --teal-deep:#16332F;
    --empty:#3A3226; --done:#6FBBA6; --missed:#E08252;

    /* Tón sekce: akční sekce (První pomoc, Tělo, Přerámování, Cvičení) jedou
       červeně, čtecí (Otázky, Inspirace, Články, O appce) zeleně. Nadpisy,
       odrážky a ikonky se řídí --tone; data-tone se přepíná na #mc-root podle
       otevřené sekce. Výchozí = accent. */
    --tone:var(--accent); --tone-soft:var(--accent-dim);

    /* Jednotná osa zarovnání — dřív si každý blok odsazoval po svém
       (18/16/14px), takže nic nesedělo na jednu linku. */
    --gutter:20px;

    --serif:'Fraunces',Georgia,'Times New Roman',ui-serif,serif;
    --sans:'Public Sans',-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
    --mono:ui-monospace,'SF Mono','Cascadia Mono',Menlo,Consolas,monospace;

    font-family:var(--sans); background:var(--bg); color:var(--body);
    max-width:520px; margin:0 auto; min-height:100vh; padding-bottom:60px;
    line-height:1.55; font-size:16px; -webkit-font-smoothing:antialiased; position:relative;
  }

  /* --surface je čistě bílá, ne krémová jako v handoffu — karty a dlaždice
     potřebovaly víc kontrastu proti pozadí stránky. */
  #mc-root[data-theme="light"] {
    --bg:#F6F1E7; --surface:#FFFFFF; --surface-2:#FBF5EA; --border:#E8DFCE;
    --text:#2B241C; --body:#2B241C; --soft:#6B6053; --muted:#9C9385;
    --accent:#B8562E; --accent-dim:#F0DCCD; --on-accent:#FFFDF8;
    --teal:#3E7266; --teal-soft:#DCEAE5; --teal-deep:#1F4F49;
    --empty:#E8DFCE; --done:#3E7266; --missed:#B8562E;
  }

  /* Čtecí sekce přebarví tón na zelenou. */
  #mc-root[data-tone="teal"]{ --tone:var(--teal); --tone-soft:var(--teal-soft); }

  /* Samostatné spuštění (Pages / PWA): #mc-root visí přímo pod body a kolem
     appky prosvítá bílá stránka. Uvnitř Miowebu je #mc-root zanořený ve WP
     divech, selektor se nechytí a pozadí stránky zůstane na WordPressu.
     Barvy jsou tu natvrdo — body je nad #mc-root, na jeho proměnné nedosáhne. */
  html:has(> body > #mc-root), body:has(> #mc-root) { margin:0; background:#1C1914; }
  html:has(> body > #mc-root[data-theme="light"]),
  body:has(> #mc-root[data-theme="light"]) { background:#F6F1E7; }

  /* ===== TYPOGRAFIE =====
     Fraunces je variabilní font s osou opsz (optical size) — sám mění kresbu
     podle velikosti. Bez explicitního nastavení jede na výchozích 14pt a
     nadpisy vypadají placatě; proto se opsz řídí ručně.

     Dělba podle handoffu: Fraunces = nadpisy a čísla, Public Sans = UI
     i běžný text. Coconut téma mělo serif i na inputech a textu karet, což
     mockup nedělá. Váhy: nadpisy 600 (dřív 400 kvůli Georgii — ve Fraunces
     je 400 hubená). */
  #mc-root :is(h1,h2,h3,h4){ font-family:var(--serif); font-weight:600; letter-spacing:-0.01em; }
  #mc-root h1{ font-size:30px; line-height:1.15; font-variation-settings:'opsz' 72; }
  #mc-root h2{ font-size:20px; line-height:1.25; font-variation-settings:'opsz' 36; }
  #mc-root h3,#mc-root h4{ font-size:17px; line-height:1.3; font-variation-settings:'opsz' 24; }

  /* Eyebrow — accentový škatulkový nadpis nad sekcí (v mockupu „POSTUP") */
  .mc-eyebrow{ font-family:var(--sans); font-size:12px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--accent); margin-bottom:14px; }

  /* ===== TAG PILULKY =====
     Dřív se tagy sázely jako holý text přes čárku (a v seznamu vůbec).
     Základní pilulka je teal; varianta .time je accentová (čas, trvání). */
  .mc-tag-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .mc-tag{ font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:0.02em;
    padding:5px 12px; border-radius:20px; background:var(--teal-soft); color:var(--teal); line-height:1.3; }
  .mc-tag.time{ background:var(--accent-dim); color:var(--accent);
    display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-weight:700; }
  .mc-tag.time svg{ width:12px; height:12px; }
  .mc-tag.more{ background:transparent; color:var(--muted); padding:5px 4px; }

  .mc-loading,.mc-error{ padding:56px 24px; text-align:center; color:var(--soft); font-size:14px; line-height:1.7; }
  .mc-error strong{ color:var(--text); font-family:var(--serif); font-weight:600; }
  .mc-error code{ color:var(--accent); font-family:var(--mono); font-size:12px; }

  /* ===== TOPBAR ===== */
  .mc-topbar{ position:sticky; top:0; z-index:30; display:flex; align-items:center; justify-content:space-between;
    gap:10px; padding:14px calc(var(--gutter) - 8px); background:var(--bg); border-bottom:1px solid var(--border); }
  .mc-icon-btn{ flex-shrink:0; width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; color:var(--soft); cursor:pointer; padding:0; border-radius:9px;
    transition:color .15s ease,background .15s ease; position:relative; }
  .mc-icon-btn:hover{ color:var(--text); background:var(--surface); }
  .mc-icon-btn svg{ width:22px; height:22px; display:block; }
  .mc-topbar-title{ flex:1; text-align:center; font-family:var(--serif); font-weight:600; font-size:19px;
    font-variation-settings:'opsz' 36; color:var(--text); letter-spacing:-0.01em; cursor:pointer; line-height:1.1; }
  .mc-topbar-title .mc-mark{ color:var(--accent); font-style:italic; }
  .mc-heart-top.on{ color:var(--accent); }
  .mc-heart-top .hf{ display:none; }
  .mc-heart-top.on .he{ display:none; }
  .mc-heart-top.on .hf{ display:block; }
  .mc-topbadge{ position:absolute; top:4px; right:4px; min-width:16px; height:16px; padding:0 4px;
    background:var(--accent); color:var(--on-accent); font-family:var(--mono); font-size:10px; font-weight:700;
    border-radius:8px; display:flex; align-items:center; justify-content:center; line-height:1; }

  /* ===== MENU ===== */
  .mc-menu-backdrop{ position:fixed; inset:0; z-index:40; background:#0009; animation:mcFade .18s ease forwards; }
  .mc-menu{ position:fixed; top:0; left:0; bottom:0; width:82%; max-width:340px; z-index:41;
    background:var(--surface); border-right:1px solid var(--border); padding:14px 0 24px; overflow-y:auto;
    animation:mcSlide .2s cubic-bezier(.2,.7,.3,1) forwards; }
  .mc-menu-head{ display:flex; align-items:center; justify-content:space-between; padding:6px 16px 14px;
    margin-bottom:6px; border-bottom:1px solid var(--border); }
  .mc-menu-head h2{ font-size:19px; color:var(--text); font-variation-settings:'opsz' 36; }
  .mc-menu-head h2 .mc-mark{ color:var(--accent); font-style:italic; }
  .mc-menu-item{ display:flex; align-items:center; gap:13px; width:100%; padding:13px 16px; background:none;
    border:none; cursor:pointer; text-align:left; color:var(--body); font-family:var(--sans); font-size:15px;
    transition:background .12s ease; }
  .mc-menu-item:hover{ background:var(--surface-2); }
  .mc-menu-item.active{ color:var(--accent); }
  .mc-menu-item .mi-ic{ flex-shrink:0; width:22px; height:22px; color:var(--soft); }
  .mc-menu-item.active .mi-ic{ color:var(--accent); }
  .mc-menu-item .mi-ic svg{ width:22px; height:22px; display:block; }
  .mc-menu-item .mi-label{ flex:1; }
  .mc-menu-item .mi-badge{ background:var(--accent); color:var(--on-accent); font-family:var(--mono); font-size:10px;
    font-weight:700; padding:1px 7px; border-radius:7px; }
  .mc-menu-sep{ height:1px; background:var(--border); margin:6px 16px; }

  /* ===== HOME ===== */
  .mc-home-intro{ padding:24px var(--gutter) 14px; }
  .mc-home-intro h1{ color:var(--tone); }
  .mc-home-intro p{ color:var(--soft); font-size:15px; line-height:1.55; margin-top:8px; }
  /* Citát dne — velikost jako názvy dlaždic, ale tenký řez. */
  .mc-home-intro p.mc-daily{ font-family:var(--serif); font-weight:400; font-size:17px; line-height:1.5;
    font-variation-settings:'opsz' 24; color:var(--body); margin-top:14px; }
  .mc-tiles{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 var(--gutter); }
  .mc-tile{ display:flex; flex-direction:column; gap:9px; min-height:118px; padding:16px 15px;
    background:var(--surface); border:1px solid var(--border); border-radius:16px; cursor:pointer; text-align:left;
    transition:border-color .15s ease,transform .1s ease,background .15s ease; position:relative; }
  .mc-tile:hover{ border-color:var(--accent); background:var(--surface-2); }
  .mc-tile:active{ transform:scale(.985); }
  /* Ikonka v barevném čtverečku podle tónu sekce — akční červeně, čtecí
     zeleně. Dřív se střídalo mechanicky ob jednu, bez významu. */
  .mc-tile-ic{ width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center;
    background:var(--accent-dim); color:var(--accent); }
  .mc-tile[data-tone="teal"] .mc-tile-ic{ background:var(--teal-soft); color:var(--teal); }
  .mc-tile-ic svg{ width:20px; height:20px; display:block; }
  .mc-tile-name{ margin-top:auto; font-family:var(--serif); font-weight:600; font-size:17px;
    font-variation-settings:'opsz' 24; color:var(--text); line-height:1.2; letter-spacing:-0.01em; }
  .mc-tile-badge{ position:absolute; top:12px; right:12px; min-width:18px; height:18px; padding:0 5px;
    background:var(--accent); color:var(--on-accent); font-family:var(--mono); font-size:10px; font-weight:700;
    border-radius:9px; display:flex; align-items:center; justify-content:center; }

  /* ===== SECTION HEADER ===== */
  .mc-sec-head{ padding:24px var(--gutter) 2px; }
  .mc-sec-head h1{ color:var(--tone); }
  .mc-sec-head p{ color:var(--soft); font-size:15px; line-height:1.55; margin-top:8px; }

  /* ===== SEARCH ===== */
  .mc-search-wrap{ padding:20px var(--gutter) 2px; position:relative; }
  .mc-search{ width:100%; padding:11px 68px 11px 40px; font-family:var(--sans); font-size:15px; color:var(--text);
    background:var(--bg); border:1px solid var(--border); border-radius:10px; outline:none; transition:border-color .15s ease; }
  .mc-search::placeholder{ color:var(--muted); }
  .mc-search:focus{ border-color:var(--accent); }
  .mc-search-icon{ position:absolute; left:32px; top:50%; transform:translateY(-50%); width:16px; height:16px;
    color:var(--soft); pointer-events:none; }
  /* Nástroje vpravo v hledání — počítadlo vybraných + křížek na vymazání.
     Dřív viselo počítadlo na right:30px, tedy mimo osu ostatního obsahu. */
  .mc-search-tools{ position:absolute; right:calc(var(--gutter) + 8px); top:50%; transform:translateY(-50%);
    display:flex; align-items:center; gap:6px; }
  .mc-count-pill{ background:var(--tone); color:var(--on-accent); font-family:var(--mono); font-size:11px;
    font-weight:700; min-width:20px; text-align:center; padding:3px 7px; border-radius:6px; pointer-events:none; }
  .mc-search-clear{ display:flex; align-items:center; justify-content:center; width:22px; height:22px; padding:0;
    background:none; border:none; cursor:pointer; color:var(--muted); border-radius:50%; transition:color .12s ease; }
  .mc-search-clear:hover{ color:var(--text); }
  .mc-search-clear svg{ width:13px; height:13px; }

  /* ===== SUBMENU (Nejnovější / Redakce / filtr) ===== */
  .mc-submenu{ display:flex; gap:6px; padding:14px 18px 4px; flex-wrap:wrap; align-items:center; }
  .mc-submenu button{ background:var(--surface); border:1px solid var(--border); color:var(--soft);
    font-family:var(--sans); font-size:13px; font-weight:600; padding:7px 14px; border-radius:8px; cursor:pointer;
    transition:all .15s ease; }
  .mc-submenu button:hover{ color:var(--text); }
  .mc-submenu button.active{ background:var(--accent); border-color:var(--accent); color:var(--on-accent); }
  .mc-submenu .mc-filter-btn{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; }
  .mc-submenu .mc-filter-btn svg{ width:15px; height:15px; }
  .mc-submenu .mc-filter-btn .fc{ background:var(--accent); color:var(--on-accent); font-family:var(--mono); font-size:10px;
    font-weight:700; padding:0 6px; border-radius:6px; }

  /* ===== FILTER PANEL ===== */
  .mc-filter{ margin:6px 18px 0; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; }
  .mc-filter .fkw{ width:100%; padding:9px 12px; font-family:var(--serif); font-size:15px; color:var(--text);
    background:var(--bg); border:1px solid var(--border); border-radius:8px; outline:none; margin-bottom:12px; }
  .mc-filter .fkw:focus{ border-color:var(--accent); }
  .mc-filter h4{ font-family:var(--sans); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    color:var(--soft); margin:10px 0 7px; }
  .mc-chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .mc-chip{ background:var(--surface-2); border:1px solid var(--border); color:var(--body); font-family:var(--sans);
    font-size:12.5px; padding:5px 11px; border-radius:20px; cursor:pointer; transition:all .12s ease; }
  .mc-chip:hover{ border-color:var(--soft); }
  .mc-chip.on{ background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:600; }
  .mc-filter-foot{ display:flex; justify-content:flex-end; margin-top:12px; }
  .mc-filter-clear{ background:none; border:none; color:var(--soft); font-family:var(--sans); font-size:12.5px;
    cursor:pointer; text-decoration:underline; }
  .mc-filter-clear:hover{ color:var(--text); }

  /* ===== FLOATING ACTION ===== */
  .mc-fab-wrap{ position:fixed; left:0; right:0; bottom:0; display:flex; justify-content:center;
    padding:16px 18px calc(16px + env(safe-area-inset-bottom)); pointer-events:none;
    background:linear-gradient(to top,var(--bg) 58%,transparent); }
  .mc-fab{ pointer-events:auto; max-width:484px; width:100%; background:var(--accent); color:var(--on-accent); border:none;
    border-radius:12px; padding:14px; font-family:var(--sans); font-size:15px; font-weight:700; cursor:pointer;
    transition:transform .12s ease,filter .15s ease; }
  .mc-fab:hover{ filter:brightness(1.06); }
  .mc-fab:active{ transform:scale(.98); }

  /* ===== FEELING LIST ===== */
  .mc-list{ padding:20px var(--gutter) 0; list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:8px; align-content:start; }
  .mc-feeling{ display:flex; align-items:center; gap:8px; padding:9px 10px 9px 11px; background:var(--surface);
    border:1px solid var(--border); border-radius:11px; transition:border-color .15s ease,background .15s ease; min-width:0; }
  .mc-feeling.checked{ border-color:var(--tone); background:var(--tone-soft); }
  .mc-check{ flex-shrink:0; width:20px; height:20px; border-radius:6px; border:1px solid var(--border);
    background:var(--surface-2); color:var(--soft); cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .12s ease; }
  .mc-check.on{ background:var(--tone); border-color:var(--tone); }
  .mc-check svg{ width:12px; height:12px; color:var(--on-accent); opacity:0; transition:opacity .12s ease; }
  .mc-check.on svg{ opacity:1; }
  .mc-check:active{ transform:scale(.92); }
  .mc-feeling-name{ flex:1; min-width:0; font-family:var(--serif); font-weight:600; font-size:13.5px;
    font-variation-settings:'opsz' 14; letter-spacing:0; line-height:1.25; color:var(--text); cursor:pointer;
    overflow-wrap:anywhere; hyphens:auto; }
  .mc-feeling-go{ flex-shrink:0; font-family:var(--mono); color:var(--soft); font-size:15px; opacity:.45; cursor:pointer; padding:0 1px; }
  .mc-feeling-name:hover ~ .mc-feeling-go,.mc-feeling-go:hover{ opacity:.9; color:var(--tone); }
  .mc-more{ width:auto; margin:10px var(--gutter) 4px; padding:11px; background:transparent; border:1px dashed var(--border);
    border-radius:14px; color:var(--soft); font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s ease; }
  .mc-more:hover{ color:var(--text); border-color:var(--soft); }

  /* ===== NAME LIST (crisis, body) ===== */
  .mc-namelist{ padding:24px var(--gutter) 0; }
  .mc-name-item{ display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
    padding:15px 17px; background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:8px;
    cursor:pointer; text-align:left; transition:border-color .15s ease,background .15s ease; }
  .mc-name-item:hover{ border-color:var(--accent); background:var(--surface-2); }
  .mc-name-item .n{ font-family:var(--serif); font-weight:600; font-size:16.5px; font-variation-settings:'opsz' 24;
    letter-spacing:-0.01em; color:var(--text); line-height:1.25; }
  .mc-name-item .go{ font-family:var(--mono); color:var(--soft); font-size:18px; opacity:.5; }

  /* ===== BACK / DETAIL ===== */
  .mc-back{ display:inline-flex; align-items:center; gap:5px; margin:20px var(--gutter) 0; background:none; border:none;
    padding:0; color:var(--accent); font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; transition:opacity .15s ease; }
  .mc-back:hover{ opacity:.7; }
  .mc-detail-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:14px var(--gutter) 2px; }
  .mc-detail-title{ font-family:var(--serif); font-weight:600; font-size:30px; font-variation-settings:'opsz' 72;
    color:var(--tone); letter-spacing:-0.01em; line-height:1.15; }
  .mc-detail-sub{ padding:0 18px 2px; color:var(--soft); font-family:var(--mono); font-size:12px; }
  .mc-detail-heart{ flex-shrink:0; background:none; border:none; cursor:pointer; padding:4px; color:var(--muted); transition:transform .12s ease; }
  .mc-detail-heart:active{ transform:scale(.9); }

  .mc-tabbar{ display:flex; gap:6px; padding:18px var(--gutter) 4px; }

    transition:background .15s ease,color .15s ease; }

    width:5px; height:5px; border-radius:50%; background:var(--tone); }

  /* ===== KROKY =====
     Mockup má kroky jako kruh s číslem + vertikální linka. Data jsou ale
     markdown s číslovaným seznamem, ne strukturovaná pole — datový model se
     nesahá. Kroky se proto skládají z <ol>, který renderer už vyrábí:
     counter dělá číslo, ::before kruh, ::after linku k dalšímu kroku.
     Platí jen na vnořené úrovni 0 (.mc-steps > ol), aby vnitřní seznamy
     zůstaly normální odrážky. */
  .mc-steps > ol{ list-style:none; padding-left:0; counter-reset:mcstep; margin:0; }
  .mc-steps > ol > li{ position:relative; padding-left:48px; padding-bottom:22px; margin-bottom:0;
    counter-increment:mcstep; }
  .mc-steps > ol > li::before{ content:counter(mcstep); position:absolute; left:0; top:-4px;

  .mc-steps > ol > li > strong:first-child{ display:block; font-family:var(--sans); font-size:16px;

  .mc-steps > ol > li ul{ margin-top:6px; margin-bottom:0; color:var(--soft); font-size:14.5px; }

  .mc-md li > ul{ list-style:circle; }
  .mc-md li::marker{ color:var(--accent); }
  .mc-md strong{ color:var(--text); font-weight:700; }

  .mc-more-page{ width:calc(100% - 36px); margin:4px 18px 0; padding:12px; background:var(--surface);

    font-weight:600; cursor:pointer; transition:border-color .15s ease; }

  /* ===== ABOUT ===== */

  .mc-about p{ margin:0 0 14px; }
  .mc-about strong{ color:var(--text); }

  @keyframes mcIn{ from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:translateY(0);} }
  .mc-in{ animation:mcIn .2s ease forwards; }
  @keyframes mcFade{ from{opacity:0;} to{opacity:1;} }
  @keyframes mcSlide{ from{transform:translateX(-100%);} to{transform:translateX(0);} }
</style>

<script>
(function(){
  "use strict";

  // ===================== KONFIGURACE =====================
  var MC_BASE = "./data/";   // JSONy leží v data/ vedle tohohle souboru
  var FILES = {
    clusters:"clusters.json", feelings:"feelings.json",
    reframings:"reframings.json", questions_rf:"reframing_questions.json", actions:"reframing_actions.json",
    crisis:"crisis.json", body:"body.json", exercises:"exercises.json",
    inspirations:"inspirations.json", questions:"questions.json", articles:"articles.json"
  };

  // triplet přerámování
  var TYPES = [
    { key:"reframings",   store:"reframings",          label:"Přerámování" },
    { key:"questions_rf", store:"reframing_questions", label:"Otázky" },
    { key:"actions",      store:"reframing_actions",   label:"Úkoly" }
  ];

  // ploché obsahové typy — jeden config řídí renderery, filtr i oblíbené
  //  render: "cards" (title/perex + detail) | "quotes" (celý text v kartě) | "doclist" (název → md detail)
  var CONTENT = {
    crisis:       { dataKey:"crisis",       store:"crisis",       label:"První pomoc",       render:"doclist", titleField:"name", alpha:false, search:false },
    body:         { dataKey:"body",         store:"body",         label:"Tělesné příznaky",  render:"doclist", titleField:"name", alpha:true,  search:true  },
    exercises:    { dataKey:"exercises",    store:"exercises",    label:"Cvičení",           render:"cards",   titleField:"name",  timeField:"duration",     redakce:true, info:true },
    articles:     { dataKey:"articles",     store:"articles",     label:"Články",            render:"cards",   titleField:"title", timeField:"reading_time", redakce:true, readable:true },
    inspirations: { dataKey:"inspirations", store:"inspirations", label:"Inspirace",         render:"quotes",  redakce:false },
    questions:    { dataKey:"questions",    store:"questions",    label:"Otázky",            render:"quotes",  redakce:false }
  };

  var STORE_KEY = "mc_kompletni_v1";
  var FAV_STORES = ["crisis","body","articles","exercises",
                    "reframings","reframing_questions","reframing_actions","inspirations","questions"];
  // mapování store -> {dataKey, jak zobrazit v oblíbených}
  var FAV_VIEW = [
    { store:"crisis",              dataKey:"crisis",       label:"První pomoc",          kind:"name" },
    { store:"body",                dataKey:"body",         label:"Tělesné příznaky",     kind:"name" },
    { store:"articles",            dataKey:"articles",     label:"Články",               kind:"title" },
    { store:"exercises",           dataKey:"exercises",    label:"Cvičení",              kind:"name" },
    { store:"reframings",          dataKey:"reframings",   label:"Přerámování",          kind:"text" },
    { store:"reframing_questions", dataKey:"questions_rf", label:"Otázky (přerámování)", kind:"text" },
    { store:"reframing_actions",   dataKey:"actions",      label:"Úkoly",                kind:"text" },
    { store:"inspirations",        dataKey:"inspirations", label:"Inspirace",            kind:"quote" },
    { store:"questions",           dataKey:"questions",    label:"Podnětné otázky",      kind:"text" }
  ];

  // ===================== IKONY =====================
  var IC = {
    crisis:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3z"/><path d="M12 8v4M12 16h.01"/></svg>',
    body:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 5.6a5.5 5.5 0 0 0-8.8-1.4 5.5 5.5 0 0 0-8.8 6.6C4.8 13.5 12 20 12 20s7.2-6.5 8.8-9.2a5.5 5.5 0 0 0 0-5.2z"/></svg>',

    exercises:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.2"/><path d="M12 8v6M8 22l4-8 4 8M6 11h12"/></svg>',
    questions:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/><circle cx="12" cy="12" r="10"/></svg>',
    inspirations:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5 3.6 3.6M20.4 20.4 19 19M19 5l1.4-1.4M3.6 20.4 5 19"/><circle cx="12" cy="12" r="4"/></svg>',
    articles:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13a2 2 0 0 1 2 2v14H6a2 2 0 0 1-2-2V4z"/><path d="M8 8h7M8 12h7M8 16h4"/></svg>',
    about:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
    favorites:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg>',
    filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.5 10 19 14 21 14 12.5 22 3"/></svg>',
    clock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    star:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3 6.3 6.9.9-5 4.8 1.2 6.8L12 17.6 5.9 20.8 7.1 14l-5-4.8 6.9-.9z"/></svg>',
    sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'
  };

  // ===================== REGISTR SEKCÍ =====================
  // tone: "accent" = akční sekce (zásah, když je zle), "teal" = čtecí (práce
  // na sobě, volné čtení). Řídí barvu nadpisů, odrážek a ikonky dlaždice.
  var SECTIONS = [
    { key:"crisis",       label:"První pomoc",      icon:"crisis",       kind:"content",   tile:true, tone:"accent" },
    { key:"body",         label:"Tělesné příznaky", icon:"body",         kind:"content",   tile:true, tone:"accent" },
    { key:"reframing",    label:"Přerámování",      icon:"reframing",    kind:"reframing", tile:true, tone:"accent" },
    { key:"exercises",    label:"Cvičení",          icon:"exercises",    kind:"content",   tile:true, tone:"accent" },
    { key:"questions",    label:"Otázky",           icon:"questions",    kind:"content",   tile:true, tone:"teal" },
    { key:"inspirations", label:"Inspirace",        icon:"inspirations", kind:"content",   tile:true, tone:"teal" },
    { key:"articles",     label:"Články",           icon:"articles",     kind:"content",   tile:true, tone:"teal" },
    { key:"about",        label:"O appce",          icon:"about",        kind:"about",     tile:true, tone:"teal" },
    { key:"favorites",    label:"Oblíbené",         icon:"favorites",    kind:"favorites", tile:false, tone:"accent" }
  ];
  function sectionByKey(k){ for(var i=0;i<SECTIONS.length;i++){ if(SECTIONS[i].key===k) return SECTIONS[i]; } return null; }

  // ===================== STAV =====================
  var DB=null, clusterName={}, clusterSort={}, byCluster={}, itemIndex={}, contentClusters=[];
  var flat={};  // dataKey -> [items sorted by sort_order]

  var state = {
    page:"home", section:null, menuOpen:false,
    rf:{ view:"feelings", showSecondary:false, selected:{}, detailClusters:[], detailMode:"single", activeType:"reframings", search:"", pageLimit:50 },
    sec:{},         // key -> { mode, filterOpen, kw, tags:[], dur, search }
    detail:null     // { type, id, infoOpen }
  };
  function secState(key){
    if(!state.sec[key]) state.sec[key]={ mode:"new", filterOpen:false, kw:"", tags:[], dur:null, search:"" };
    return state.sec[key];
  }

  // ===================== UŽIVATELSKÁ DATA =====================
  var USER=loadUser();
  function emptyUser(){ var u={favorites:{},read:[],last_seen:{},profile:{},daily:null}; FAV_STORES.forEach(function(s){u.favorites[s]=[];}); return u; }
  function loadUser(){
    var u=emptyUser();
    try{ var d=JSON.parse(localStorage.getItem(STORE_KEY));
      if(d&&typeof d==="object"){
        FAV_STORES.forEach(function(s){ if(Array.isArray(d.favorites&&d.favorites[s])) u.favorites[s]=d.favorites[s]; });
        if(Array.isArray(d.read)) u.read=d.read;
        if(d.last_seen&&typeof d.last_seen==="object") u.last_seen=d.last_seen;
        if(d.profile&&typeof d.profile==="object") u.profile=d.profile;
        if(d.daily&&typeof d.daily==="object") u.daily=d.daily;
      }
    }catch(e){}
    return u;
  }
  function saveUser(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(USER)); }catch(e){} }

  // ===================== DNEŠNÍ INSPIRACE =====================
  // Jeden citát na den, drží se přes celý den (opakované otevření appky ho
  // nemění). Pamatuje si, co už padlo — nová inspirace se losuje jen z těch
  // neviděných; když dojdou všechny, kolo se restartuje.
  // Lokální datum, ne UTC — jinak by se citát měnil ve dvě ráno.
  function today(){
    var d=new Date();
    return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2);
  }
  function dailyInspiration(){
    var all=(DB&&DB.inspirations)||[];
    if(!all.length) return null;
    var d=USER.daily, t=today();
    if(d&&d.date===t){
      var cur=(itemIndex.inspirations||{})[d.id];
      if(cur) return cur;   // položka mohla zmizet z dat → přelosuje se
    }
    var seen=(d&&Array.isArray(d.seen))?d.seen:[];
    var pool=all.filter(function(x){ return seen.indexOf(x.id)<0; });
    if(!pool.length){ seen=[]; pool=all.slice(); }
    var pick=pool[Math.floor(Math.random()*pool.length)];
    USER.daily={ date:t, id:pick.id, seen:seen.concat([pick.id]) };
    saveUser();
    return pick;
  }

  // ===================== TÉMA =====================
  // Volba přežívá v localStorage; dokud si uživatel nevybere, jede se podle
  // systému. data-theme se píše na #mc-root, ne na <html> — uvnitř Miowebu
  // nad ním nemáme kontrolu.
  var THEME_KEY="mc_theme";
  function theme(){
    var t; try{ t=localStorage.getItem(THEME_KEY); }catch(e){}
    if(t==="light"||t==="dark") return t;
    try{ if(window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches) return "light"; }catch(e){}
    return "dark";
  }
  function applyTheme(){
    var t=theme(), root=document.getElementById("mc-root");
    if(root) root.setAttribute("data-theme",t);
    var m=document.querySelector('meta[name="theme-color"]');
    if(m) m.setAttribute("content", t==="light"?"#F6F1E7":"#1C1914");
  }
  function favCount(){ return FAV_STORES.reduce(function(n,s){ return n+USER.favorites[s].length; },0); }

  function toggleFav(store,id){ var a=USER.favorites[store],i=a.indexOf(id); if(i>-1)a.splice(i,1); else a.push(id); saveUser(); }
  function isRead(id){ return USER.read.indexOf(id)>-1; }
  function markRead(id){ if(USER.read.indexOf(id)<0){ USER.read.push(id); saveUser(); } }
  function newsTotal(){ return 0; }

  // ===================== NAČTENÍ =====================
  function load(){
    var keys=Object.keys(FILES);
    Promise.all(keys.map(function(k){
      return fetch(MC_BASE+FILES[k],{cache:"no-cache"}).then(function(r){ if(!r.ok) throw new Error(FILES[k]+" → HTTP "+r.status); return r.json(); });
    })).then(function(arrs){
      DB={}; keys.forEach(function(k,i){ DB[k]=arrs[i]; });
      prepare(); render();
    }).catch(showError);
  }

  function prepare(){
    DB.clusters.forEach(function(c){ clusterName[c.id]=c.name; clusterSort[c.id]=c.sort_order; });
    TYPES.forEach(function(t){
      byCluster[t.key]={}; itemIndex[t.key]={};
      (DB[t.key]||[]).forEach(function(it){
        (byCluster[t.key][it.cluster_id]=byCluster[t.key][it.cluster_id]||[]).push(it);
        itemIndex[t.key][it.id]=it;
      });
      Object.keys(byCluster[t.key]).forEach(function(cid){ byCluster[t.key][cid].sort(function(a,b){ return a.sort_order-b.sort_order; }); });
    });
    contentClusters=Object.keys(byCluster.reframings);
    Object.keys(CONTENT).forEach(function(key){
      var dk=CONTENT[key].dataKey;
      flat[dk]=(DB[dk]||[]).slice().sort(function(a,b){ return a.sort_order-b.sort_order; });
      itemIndex[dk]={}; flat[dk].forEach(function(it){ itemIndex[dk][it.id]=it; });
    });
  }

  function showError(err){
    document.getElementById("mc-root").innerHTML=
      '<div class="mc-error"><strong>Data se nepodařilo načíst.</strong><br><br>'+
      'JSONy se čtou relativně z <code>data/</code>. Spusť appku přes lokální '+
      'server v kořeni repa, ne otevřením souboru z disku.<br><br><span style="opacity:.6">Detail: '+esc(String(err&&err.message||err))+'</span></div>';
  }

  // ===================== POMOCNÉ =====================
  function esc(s){ var d=document.createElement("div"); d.appendChild(document.createTextNode(s)); return d.innerHTML; }
  function deburr(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
  function minutes(n){ return '<span class="m">'+IC.clock+(n||0)+' min</span>'; }
  // Tag pilulky. V kartách seznamu se řada ořezává (limit), ať karta nenaroste
  // do plotu — v detailu se ukazují všechny.
  function tagRow(tags,limit){
    if(!tags||!tags.length) return "";
    var show=limit?tags.slice(0,limit):tags, rest=limit?tags.length-show.length:0;
    var h='<div class="mc-tag-row">';
    show.forEach(function(t){ h+='<span class="mc-tag">'+esc(t)+'</span>'; });
    if(rest>0) h+='<span class="mc-tag more">+'+rest+'</span>';
    return h+'</div>';
  }
  function timeTag(n){ return '<span class="mc-tag time">'+IC.clock+(n||0)+' min</span>'; }

  // ===================== MARKDOWN ===================== (identický s produkcí)
  function mdInline(s){ return esc(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>"); }
  // Těla v datech začínají nadpisem, který opakuje název položky — ten je ale
  // už v titulku detailu, takže by se název ukázal dvakrát pod sebou.
  // Zahodíme první nadpis, jen když se s názvem shoduje.
  function stripDupHeading(src,title){
    if(!src||!title) return src;
    var norm=function(s){ return deburr(String(s).replace(/[*_`#]/g,"")).trim(); };
    var lines=String(src).split(/\r?\n/), i=0;
    while(i<lines.length && !lines[i].trim()) i++;
    var m=lines[i]&&lines[i].trim().match(/^#{1,6}\s+(.*)$/);
    if(m && norm(m[1])===norm(title)) return lines.slice(i+1).join("\n");
    return src;
  }

  // Těla cvičení nesou na začátku řádek "**Trvání:** ..." — je to bohatší údaj
  // než číselné `duration` ("průběžně po dobu 1-2 týdnů" vs "10 min"), takže
  // ho vytáhneme do duration stripu a z těla zahodíme, ať se neopakuje.
  function pullDuration(src){
    if(!src) return { text:null, body:src };
    var lines=String(src).split(/\r?\n/);
    for(var i=0;i<lines.length && i<6;i++){
      var m=lines[i].trim().match(/^\*{0,2}(?:Trvání|Minut[áy]ž?|Délka)\s*:?\*{0,2}\s*:?\s*(.+)$/i);
      if(m){ var v=m[1].replace(/\*/g,"").trim(); lines.splice(i,1); return { text:v, body:lines.join("\n") }; }
    }
    return { text:null, body:src };
  }

  function md(src){
    var lines=String(src||"").split(/\r?\n/), out=[], para=[], stack=[];
    function flushPara(){ if(para.length){ out.push("<p>"+para.map(mdInline).join("<br>")+"</p>"); para=[]; } }
    function closeList(){ out.push("</li></"+stack.pop().tag+">"); }
    function closeLists(){ while(stack.length) closeList(); }
    function item(indent,tag,text){
      flushPara();
      while(stack.length && indent<stack[stack.length-1].indent) closeList();
      var top=stack[stack.length-1];
      if(!stack.length || indent>top.indent){ out.push("<"+tag+">"); stack.push({tag:tag,indent:indent}); }
      else{ out.push("</li>"); if(top.tag!==tag){ out.push("</"+stack.pop().tag+">"); out.push("<"+tag+">"); stack.push({tag:tag,indent:indent}); } }
      out.push("<li>"+text);
    }
    lines.forEach(function(raw){
      var line=raw.replace(/\t/g,"    "), m; var indent=line.match(/^ */)[0].length; line=line.trim();
      if(!line){ flushPara(); return; }
      if((m=line.match(/^(#{1,6})\s+(.*)$/))){ flushPara(); closeLists(); var lvl=Math.min(Math.max(m[1].length,2),4); out.push("<h"+lvl+">"+mdInline(m[2])+"</h"+lvl+">"); return; }
      if((m=line.match(/^[-*]\s+(.*)$/))){ item(indent,"ul",mdInline(m[1])); return; }
      if((m=line.match(/^\d+[.)]\s+(.*)$/))){ item(indent,"ol",mdInline(m[1])); return; }
      closeLists(); para.push(line);
    });
    flushPara(); closeLists(); return out.join("");
  }

  // ===================== PŘERÁMOVÁNÍ — pocity + interleaving =====================
  function mainFeelings(){ return DB.feelings.filter(function(f){ return contentClusters.indexOf(f.cluster_id)>-1 && f.main && f.main!=="0"; }); }
  function secondaryFeelings(){ return DB.feelings.filter(function(f){ return contentClusters.indexOf(f.cluster_id)>-1 && (!f.main||f.main==="0"); }); }
  function visibleFeelings(){
    var rf=state.rf, list=mainFeelings().concat(rf.showSecondary?secondaryFeelings():[]);
    if(rf.search.trim()){ list=mainFeelings().concat(secondaryFeelings()); var q=deburr(rf.search); list=list.filter(function(f){ return deburr(f.name).indexOf(q)>-1; }); }
    list.sort(function(a,b){ return a.sort_order-b.sort_order; }); return list;
  }
  function interleave(typeKey,cwc){
    var counts={},ids=[]; cwc.forEach(function(c){ counts[c.cluster_id]=c.count; ids.push(c.cluster_id); });
    ids.sort(function(a,b){ if(counts[b]!==counts[a]) return counts[b]-counts[a]; return (clusterSort[a]||0)-(clusterSort[b]||0); });
    var lists={},pos={}; ids.forEach(function(cid){ lists[cid]=byCluster[typeKey][cid]||[]; pos[cid]=0; });
    var seen={},merged=[];
    function exhausted(){ return ids.every(function(cid){ return pos[cid]>=lists[cid].length; }); }
    while(!exhausted()){ ids.forEach(function(cid){ var e=0; while(e<counts[cid]&&pos[cid]<lists[cid].length){ var it=lists[cid][pos[cid]]; pos[cid]++; if(seen[it.id])continue; seen[it.id]=1; merged.push(it); e++; } }); }
    return merged;
  }
  function currentRfList(){
    var rf=state.rf;
    if(rf.detailMode==="single"){ var cid=rf.detailClusters[0].cluster_id; return (byCluster[rf.activeType][cid]||[]).slice(); }
    return interleave(rf.activeType,rf.detailClusters);
  }
  function storeOf(typeKey){ for(var i=0;i<TYPES.length;i++){ if(TYPES[i].key===typeKey) return TYPES[i].store; } }

  // ===================== FILTR obsahových sekcí =====================
  function allTags(dataKey){
    var set={}; (flat[dataKey]||[]).forEach(function(it){ (it.tags||[]).forEach(function(t){ set[t]=1; }); });
    return Object.keys(set).sort();
  }
  function durationBuckets(){ return [ {label:"do 5 min",max:5}, {label:"6–15 min",min:6,max:15}, {label:"16+ min",min:16} ]; }
  function activeFilterCount(key){ var s=secState(key), n=0; if(s.kw.trim())n++; n+=s.tags.length; if(s.dur!=null)n++; return n; }
  function contentList(key){
    var cfg=CONTENT[key], s=secState(key), items=(flat[cfg.dataKey]||[]).slice();
    if(s.mode==="edit" && cfg.redakce){ items=items.filter(function(it){ return it.quality===5; }); shuffle(items); }
    else { items.sort(function(a,b){ return String(b.added_at||"").localeCompare(String(a.added_at||"")) || b.sort_order-a.sort_order; }); }
    if(s.kw.trim()){
      var q=deburr(s.kw);
      items=items.filter(function(it){ var hay=deburr([it.title,it.name,it.text,it.perex].filter(Boolean).join(" ")); return hay.indexOf(q)>-1; });
    }
    if(s.tags.length){ items=items.filter(function(it){ var t=it.tags||[]; return s.tags.every(function(tag){ return t.indexOf(tag)>-1; }); }); }
    if(s.dur!=null && cfg.timeField){
      var b=durationBuckets()[s.dur];
      items=items.filter(function(it){ var v=it[cfg.timeField]||0; return (b.min==null||v>=b.min)&&(b.max==null||v<=b.max); });
    }
    return items;
  }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

  // ===================== RENDER — obal =====================
  function render(){
    var root=document.getElementById("mc-root");
    // Tón podle otevřené sekce; na home a v detailu se drží tón té sekce,
    // odkud se přišlo. Home sama je neutrální (accent).
    var cur=sectionByKey(state.page==="favorites"?"favorites":state.section);
    root.setAttribute("data-tone",(cur&&cur.tone)||"accent");
    var h=viewTopbar();
    if(state.detail){ h+=viewContentDetail(); }
    else if(state.page==="home"){ h+=viewHome(); }
    else if(state.page==="favorites"){ h+=viewFavorites(); }
    else {
      var sec=sectionByKey(state.section);
      if(sec&&sec.kind==="reframing") h+=viewReframing();
      else if(sec&&sec.kind==="favorites") h+=viewFavorites();
      else if(sec&&sec.kind==="about") h+=viewAbout();
      else if(sec&&sec.kind==="content") h+=viewContent(sec.key);
      else h+='<div class="mc-empty">—</div>';
    }
    if(state.menuOpen) h+=viewMenu();
    root.innerHTML=h;
    var s=document.getElementById("mc-search");
    if(s){ var v=(state.section==="reframing")?state.rf.search:(secState(state.section||"").search); if(v){ s.value=v; } }
  }

  function viewCards(key){

  function viewFilterPanel(key){
    var cfg=CONTENT[key], s=secState(key);
    var h='<div class="mc-filter">';
    h+='<input class="fkw" placeholder="Klíčové slovo…" value="'+esc(s.kw)+'" oninput="MC.secKw(\''+key+'\',this.value)">';
    var tags=allTags(cfg.dataKey);
    if(tags.length){
      h+='<h4>Štítky</h4><div class="mc-chips">';
      tags.forEach(function(t){ h+='<button class="mc-chip '+(s.tags.indexOf(t)>-1?"on":"")+'" onclick="MC.secTag(\''+key+'\',\''+esc(t).replace(/'/g,"\\'")+'\')">'+esc(t)+'</button>'; });
      h+='</div>';
    }
    if(cfg.timeField==="duration"){
      h+='<h4>Délka</h4><div class="mc-chips">';
      durationBuckets().forEach(function(b,i){ h+='<button class="mc-chip '+(s.dur===i?"on":"")+'" onclick="MC.secDur(\''+key+'\','+i+')">'+b.label+'</button>'; });
      h+='</div>';
    }
    if(activeFilterCount(key)>0) h+='<div class="mc-filter-foot"><button class="mc-filter-clear" onclick="MC.secClear(\''+key+'\')">Zrušit filtry</button></div>';
    return h+'</div>';
  }

  function contentCard(key,cfg,it){
    var title=it[cfg.titleField]||"";
    var store=cfg.store, on=isFav(store,it.id), read=cfg.readable&&isRead(it.id);
    var h='<li class="mc-card clickable mc-in '+(read?"read":"")+'" onclick="MC.detail(\''+cfg.dataKey+'\',\''+it.id+'\')">';
    h+='<div class="mc-card-title">'+esc(title)+'</div>';
    if(it.perex) h+='<div class="mc-card-text">'+esc(it.perex)+'</div>';
    if(it.tags&&it.tags.length) h+=tagRow(it.tags,2);
    h+='<div class="mc-card-meta">';
    if(cfg.timeField) h+=minutes(it[cfg.timeField]);
    if(cfg.redakce&&it.quality===5) h+='<span class="m" style="color:var(--accent)">'+IC.star+'Redakce</span>';
    h+='</div>';
    h+=heartBtn(store,it.id,on,true)+'</li>';
    return h;
  }

  function quoteCard(cfg,it){
    var store=cfg.store, on=isFav(store,it.id);
    var h='<li class="mc-card mc-in"><div class="mc-card-text lead">'+esc(it.text)+'</div>';
    if(it.author) h+='<div class="mc-card-author">'+esc(it.author)+(it.year?' <span class="yr">· '+esc(it.year)+'</span>':'')+'</div>';
    if(it.tags&&it.tags.length) h+=tagRow(it.tags,2);
    h+=heartBtn(store,it.id,on)+'</li>';
    return h;
  }

  // ===================== RENDER — obsahový detail =====================
  function viewContentDetail(){
    var d=state.detail, item=(itemIndex[d.type]||{})[d.id];
    var cfg=null; Object.keys(CONTENT).forEach(function(k){ if(CONTENT[k].dataKey===d.type) cfg=CONTENT[k]; });
    if(!item||!cfg) return '<div class="mc-empty">Položka nenalezena.</div>';
    var title=item[cfg.titleField]||item.name||"";
    var store=cfg.store, on=isFav(store,d.id);
    var hasTabs=!!(cfg.info&&item.info), onInfo=hasTabs&&d.infoOpen;

    var h='<button class="mc-back" onclick="MC.detailBack()">← Zpět</button>';
    // Pořadí podle mockupu: tag pilulky nad H1, pak titulek, pak perex.
    // Čas u cvičení nese duration strip pod taby, takže pilulku nedubluje.
    var pills=[];
    if(cfg.timeField&&item[cfg.timeField]&&!hasTabs) pills.push(timeTag(item[cfg.timeField]));
    if(item.tags&&item.tags.length) item.tags.forEach(function(t){ pills.push('<span class="mc-tag">'+esc(t)+'</span>'); });
    if(pills.length) h+='<div class="mc-detail-meta"><div class="mc-tag-row">'+pills.join("")+'</div></div>';

    h+='<div class="mc-detail-head"><div class="mc-detail-title">'+esc(title)+'</div>';
    h+='<button class="mc-detail-heart '+(on?"on":"")+'" onclick="MC.fav(\''+store+'\',\''+d.id+'\')" aria-label="Uložit"><svg class="he" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg><svg class="hf" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg></button></div>';
    if(item.perex) h+='<div class="mc-detail-perex">'+esc(item.perex)+'</div>';

    if(hasTabs){
      h+='<div class="mc-tabbar">';
      h+='<button class="mc-tab '+(onInfo?"":"active")+'" onclick="MC.detailTab(0)">Postup</button>';
      h+='<button class="mc-tab '+(onInfo?"active":"")+'" onclick="MC.detailTab(1)">Info<span class="dot"></span></button>';
      h+='</div>';
    }
    if(onInfo){
      h+='<div class="mc-detail-body mc-md">'+md(stripDupHeading(item.info,title))+'</div>';
    } else {
      var dur=pullDuration(stripDupHeading(item.body,title));
      // Strip jen tam, kde jsou taby (cvičení). Články nesou čas pilulkou nad
      // titulkem, jinak by ho měly dvakrát.
      var durText=hasTabs?(dur.text||(cfg.timeField&&item[cfg.timeField]?item[cfg.timeField]+" min":null)):null;
      if(durText){
        h+='<div class="mc-strip"><div class="s-ic">'+IC.clock+'</div><div>'+
           '<div class="s-label">Trvání</div><div class="s-value">'+esc(durText)+'</div></div></div>';
      }
      h+='<div class="mc-detail-body mc-md'+(hasTabs?" mc-steps":"")+'">'+md(dur.body)+'</div>';
    }
    if(cfg.readable) markRead(d.id);
    return h;
  }

  // ===================== RENDER — Oblíbené =====================
  function viewFavorites(){
    var h='<div class="mc-sec-head"><h1>Oblíbené</h1></div>';
    if(favCount()===0) return h+'<div class="mc-empty"><div class="e-ic">♡</div>Zatím tu nic není.<br>Klepni na srdíčko u věty, která tě osloví, a najdeš ji tady.</div>';
    FAV_VIEW.forEach(function(fv){
      var items=USER.favorites[fv.store].slice().reverse().map(function(id){ return (itemIndex[fv.dataKey]||{})[id]; }).filter(Boolean);
      if(items.length===0) return;
      h+='<div class="mc-fav-group"><h2>'+esc(fv.label)+' <span class="c">'+items.length+'</span></h2><ul class="mc-cards" style="padding-left:0;padding-right:0">';
      items.forEach(function(it){
        h+='<li class="mc-card mc-in">';
        if(fv.kind==="title") h+='<div class="mc-card-title">'+esc(it.title||"")+'</div>'+(it.perex?'<div class="mc-card-text">'+esc(it.perex)+'</div>':'');
        else if(fv.kind==="name") h+='<div class="mc-card-title">'+esc(it.name||"")+'</div>';
        else if(fv.kind==="quote"){ h+='<div class="mc-card-text lead">'+esc(it.text||"")+'</div>'; if(it.author) h+='<div class="mc-card-author">'+esc(it.author)+(it.year?' <span class="yr">· '+esc(it.year)+'</span>':'')+'</div>'; }
        else { h+='<div class="mc-card-text">'+esc(it.text||"")+'</div>'; if(it.cluster_id) h+='<div class="mc-card-meta">'+esc(clusterName[it.cluster_id]||"")+'</div>'; }
        h+=heartBtn(fv.store,it.id,true)+'</li>';
      });
      h+='</ul></div>';
    });
    return h;
  }

  // ===================== RENDER — O appce =====================
  function viewAbout(){
    return '<button class="mc-back" onclick="MC.home()">← Domů</button>'+
      '<div class="mc-detail-title" style="padding-top:14px">O aplikaci</div>'+
      '<div class="mc-about">'+
      '<p><strong>Moje cesta</strong> je psychoterapeutická appka. Vyber jádrový pocit — a dostaneš přerámování, otázky a úkoly, které ti pomůžou podívat se na to, co prožíváš, jinak.</p>'+
      '<p>Vedle přerámování tu najdeš <strong>mikročlánky</strong>, <strong>cvičení</strong>, <strong>inspirace</strong>, <strong>podnětné otázky</strong>, encyklopedii <strong>tělesných příznaků</strong> a <strong>první pomoc</strong> v psychické krizi.</p>'+
      '<p>Co tě osloví, ulož si srdíčkem do <strong>Oblíbených</strong> — máš to pak po ruce.</p>'+
      '<p style="color:var(--soft); font-size:14px; font-family:var(--sans)">Autor obsahu: Robert Řeřicha, psychoterapeut.</p>'+
      '</div>';
  }

  // ===================== SPOLEČNÉ =====================
  function heartBtn(store,id,on,stop){
    var s=stop?'event.stopPropagation();':'';
    return '<button class="mc-heart '+(on?"on":"")+'" onclick="'+s+'MC.fav(\''+store+'\',\''+id+'\')" aria-label="Uložit do oblíbených"><svg class="he" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg><svg class="hf" viewBox="0 0 24 24" fill="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1 1.1L12 21.2l7.8-7.7 1-1.1a5.5 5.5 0 0 0 0-7.8z"/></svg></button>';
  }

  // ===================== HANDLERY =====================
  window.MC = {
    menu:function(open){ state.menuOpen=!!open; render(); },
    home:function(){ state.page="home"; state.section=null; state.detail=null; state.menuOpen=false; scrollTop(); render(); },
    open:function(key){
      state.menuOpen=false; state.detail=null;
      if(key==="favorites"){ state.page="favorites"; state.section=null; }
      else { state.page="section"; state.section=key; if(key==="reframing") state.rf.view="feelings"; }
      scrollTop(); render();
    },
    // Přerámování
    rfSearch:function(v){ state.rf.search=v; render(); var s=document.getElementById("mc-search"); if(s){ s.focus(); s.value=v; s.setSelectionRange(v.length,v.length); } },
    rfSecondary:function(){ state.rf.showSecondary=!state.rf.showSecondary; render(); },
    rfToggle:function(id){ var sel=state.rf.selected; if(sel[id]) delete sel[id]; else { var f=DB.feelings.filter(function(x){return x.id===id;})[0]; if(f) sel[id]=f; } render(); },
    rfSingle:function(cid){ state.rf.detailMode="single"; state.rf.detailClusters=[{cluster_id:cid,count:1}]; enterRfDetail(); },
    rfOpenSelected:function(){
      var sel=state.rf.selected, feels=Object.keys(sel).map(function(k){return sel[k];}), counts={};
      feels.forEach(function(f){ counts[f.cluster_id]=(counts[f.cluster_id]||0)+1; });
      var cids=Object.keys(counts);
      if(cids.length===1){ state.rf.detailMode="single"; state.rf.detailClusters=[{cluster_id:cids[0],count:counts[cids[0]]}]; }
      else { state.rf.detailMode="merged"; state.rf.detailClusters=cids.map(function(c){ return {cluster_id:c,count:counts[c]}; }); }
      enterRfDetail();
    },
    rfBack:function(){ state.rf.view="feelings"; scrollTop(); render(); },
    rfType:function(t){ state.rf.activeType=t; state.rf.pageLimit=50; scrollTop(); render(); },
    rfMore:function(){ state.rf.pageLimit+=50; render(); },
    // obsahové sekce
    secMode:function(key,m){ secState(key).mode=m; scrollTop(); render(); },
    secFilter:function(key){ var s=secState(key); s.filterOpen=!s.filterOpen; render(); },
    secKw:function(key,v){ secState(key).kw=v; render(); var i=document.querySelector(".mc-filter .fkw"); if(i){ i.focus(); i.value=v; i.setSelectionRange(v.length,v.length); } },
    secTag:function(key,t){ var s=secState(key),i=s.tags.indexOf(t); if(i>-1)s.tags.splice(i,1); else s.tags.push(t); render(); },
    secDur:function(key,i){ var s=secState(key); s.dur=(s.dur===i?null:i); render(); },
    secClear:function(key){ var s=secState(key); s.kw=""; s.tags=[]; s.dur=null; render(); },
    secSearch:function(v){ secState(state.section).search=v; render(); var s=document.getElementById("mc-search"); if(s){ s.focus(); s.value=v; s.setSelectionRange(v.length,v.length); } },
    // detail
    detail:function(type,id){ state.detail={ type:type, id:id, infoOpen:false }; scrollTop(); render(); },
    detailBack:function(){ state.detail=null; scrollTop(); render(); },
    detailInfo:function(){ if(state.detail) state.detail.infoOpen=!state.detail.infoOpen; render(); },
    detailTab:function(i){ if(state.detail) state.detail.infoOpen=(i===1); scrollTop(); render(); },
    // oblíbené
    fav:function(store,id){ toggleFav(store,id); render(); },
    // téma
    theme:function(){
      var next=theme()==="light"?"dark":"light";
      try{ localStorage.setItem(THEME_KEY,next); }catch(e){}
      applyTheme(); render();
    }
  };

  function enterRfDetail(){ state.rf.view="detail"; state.rf.activeType="reframings"; state.rf.pageLimit=50; scrollTop(); render(); }
  function scrollTop(){ var r=document.getElementById("mc-root"); if(r&&r.scrollIntoView) r.scrollIntoView({block:"start"}); }

  applyTheme();
  load();
})();
</script>
