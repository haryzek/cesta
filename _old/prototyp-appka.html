          "Jsem špatný člověk — to je bug, kde se celý systém identifikuje s jednou chybovou hláškou. Patch: odděl self od behavior. Choval ses špatně ≠ jsi špatný.",
          "Možná nejsi špatný. Možná jsi jen člověk, který udělal pár špatných věcí v životě plném neutrálních a dobrých věcí — a pak si z toho udělal celou identitu.",
          "Víš, kdo si myslí, že je špatný? Lidi, od kterých se v dětství vyžadovalo, aby byli dokonalí. Špatnost není tvá podstata — je to stín nerealistického nároku.",
          "Pocit \"jsem bídný člověk\" v sobě skrývá tichou naději — protože kdyby ses opravdu vzdal, přestal bys o tom přemýšlet. To, že to bolí, znamená, že pořád věříš, že můžeš být lepší.",
          "Celý lidský druh je směs šlechetnosti a svinstva. To není tvůj osobní problém — to je lidská podmínka. Akorát ty sis z toho udělal osobní selhání.",
          "Co kdybys nebyl špatný, ale jen unavený z pokusu být dobrý podle pravidel, která nikdy nebyla tvoje?"
        ]
      }
    ]
  };

  // ====== STATE ======
  var state = {
    page: "list", // "list" | "detail" | "favorites"
    currentCluster: null,
    searchQuery: "",
    favorites: loadFavorites()
  };

  // ====== FAVORITES STORAGE ======
  function loadFavorites() {
    try {
      var data = localStorage.getItem("app-favorites");
      return data ? JSON.parse(data) : [];
    } catch(e) {
      return [];
    }
  }

  function saveFavorites() {
    try {
      localStorage.setItem("app-favorites", JSON.stringify(state.favorites));
    } catch(e) {}
  }

  function isFavorite(clusterId, index) {
    return state.favorites.some(function(f) {
      return f.clusterId === clusterId && f.index === index;
    });
  }

  function toggleFavorite(clusterId, index, text) {
    var existing = state.favorites.findIndex(function(f) {
      return f.clusterId === clusterId && f.index === index;
    });
    if (existing > -1) {
      state.favorites.splice(existing, 1);
    } else {
      // Find the feeling name for this cluster
      var cluster = DATA.clusters.find(function(c) { return c.id === clusterId; });
      var feelingName = cluster ? cluster.feelings[0] : "";
      state.favorites.push({
        clusterId: clusterId,
        index: index,
        text: text,
        feeling: feelingName,
        date: new Date().toISOString()
      });
    }
    saveFavorites();
    render();
  }

  // ====== SEARCH / FILTER ======
  function getAllFeelings() {
    var result = [];
    DATA.clusters.forEach(function(cluster) {
      cluster.feelings.forEach(function(feeling) {
        result.push({ feeling: feeling, clusterId: cluster.id });
      });
    });
    return result;
  }

  function filterFeelings(query) {
    var all = getAllFeelings();
    if (!query || query.trim() === "") return all;
    var q = query.toLowerCase().trim();
    return all.filter(function(item) {
      return item.feeling.toLowerCase().indexOf(q) > -1;
    });
  }

  // ====== RENDER ======
  function render() {
    var root = document.getElementById("app-root");
    var html = "";

    // Header
    html += '<div class="app-header">';
    html += '<h1>Jak se cítíš?</h1>';
    html += '<p>Vyber pocit, který ti je blízký</p>';
    html += '</div>';

    // Navigation
    var favCount = state.favorites.length;
    html += '<nav class="app-nav">';
    html += '<button onclick="appNav(\'list\')" class="' + (state.page !== "favorites" ? "active" : "") + '">Pocity</button>';
    html += '<button onclick="appNav(\'favorites\')" class="' + (state.page === "favorites" ? "active" : "") + '">Oblíbené';
    if (favCount > 0) {
      html += '<span class="fav-count">' + favCount + '</span>';
    }
    html += '</button>';
    html += '</nav>';

    // Pages
    if (state.page === "list") {
      html += renderFeelingsList();
    } else if (state.page === "detail") {
      html += renderDetail();
    } else if (state.page === "favorites") {
      html += renderFavorites();
    }

    root.innerHTML = html;

    // Focus search if on list page
    if (state.page === "list") {
      var searchEl = document.getElementById("app-search");
      if (searchEl && state.searchQuery) {
        searchEl.value = state.searchQuery;
      }
    }
  }

  function renderFeelingsList() {
    var html = '';

    // Search
    html += '<div class="search-wrap">';
    html += '<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
    html += '<input type="text" id="app-search" class="search-input" placeholder="Hledej pocit..." oninput="appSearch(this.value)" />';
    html += '</div>';

    // Feelings
    var feelings = filterFeelings(state.searchQuery);
    html += '<ul class="feelings-list">';

    if (feelings.length === 0) {
      html += '<div class="no-results">Žádný pocit nenalezen</div>';
    } else {
      feelings.forEach(function(item, i) {
        html += '<li class="feeling-item animate-in" onclick="appOpenCluster(\'' + item.clusterId + '\')">';
        html += '<span class="feeling-name">' + item.feeling + '</span>';
        html += '<span class="feeling-arrow">›</span>';
        html += '</li>';
      });
    }

    html += '</ul>';
    return html;
  }

  function renderDetail() {
    var cluster = DATA.clusters.find(function(c) { return c.id === state.currentCluster; });
    if (!cluster) return '<p>Cluster nenalezen</p>';

    var html = '';
    html += '<div class="detail-header">';
    html += '<button class="back-btn" onclick="appNav(\'list\')">← Zpět</button>';
    html += '</div>';
    html += '<div class="detail-title">' + cluster.feelings[0] + '</div>';

    html += '<ul class="reframings-list">';
    cluster.reframings.forEach(function(text, i) {
      var fav = isFavorite(cluster.id, i);
      html += '<li class="reframing-card animate-in">';
      html += '<div class="reframing-text">' + escapeHtml(text) + '</div>';
      html += '<button class="heart-btn ' + (fav ? 'is-fav' : '') + '" onclick="appToggleFav(\'' + cluster.id + '\',' + i + ')">';
      html += '<svg class="heart-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      html += '<svg class="heart-full" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      html += '</button>';
      html += '</li>';
    });
    html += '</ul>';

    return html;
  }

  function renderFavorites() {
    var html = '';

    if (state.favorites.length === 0) {
      html += '<div class="favorites-empty">';
      html += '<div class="empty-heart">♡</div>';
      html += 'Zatím nemáš žádná oblíbená přerámování.<br>Klikni na srdíčko u přerámování, které tě osloví.';
      html += '</div>';
      return html;
    }

    // Show favorites in reverse chronological order
    var sorted = state.favorites.slice().reverse();
    sorted.forEach(function(fav, i) {
      html += '<div class="fav-card animate-in">';
      html += '<div style="flex:1">';
      html += '<div class="fav-text">' + escapeHtml(fav.text) + '</div>';
      html += '<div class="fav-meta">' + fav.feeling + ' · ' + formatDate(fav.date) + '</div>';
      html += '</div>';
      html += '<button class="heart-btn is-fav" onclick="appToggleFav(\'' + fav.clusterId + '\',' + fav.index + ')">';
      html += '<svg class="heart-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      html += '<svg class="heart-full" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      html += '</button>';
      html += '</div>';
    });

    return html;
  }

  // ====== HELPERS ======
  function escapeHtml(text) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }

  function formatDate(isoString) {
    try {
      var d = new Date(isoString);
      return d.toLocaleDateString("cs-CZ") + " " + d.toLocaleTimeString("cs-CZ", {hour:"2-digit", minute:"2-digit"});
    } catch(e) {
      return "";
    }
  }

  // ====== GLOBAL HANDLERS ======
  window.appNav = function(page) {
    state.page = page;
    state.searchQuery = "";
    render();
    // Scroll to top of app
    document.getElementById("app-root").scrollIntoView({behavior: "smooth"});
  };

  window.appOpenCluster = function(clusterId) {
    state.currentCluster = clusterId;
    state.page = "detail";
    render();
    document.getElementById("app-root").scrollIntoView({behavior: "smooth"});
  };

  window.appSearch = function(value) {
    state.searchQuery = value;
    render();
    // Re-focus and restore cursor position
    var searchEl = document.getElementById("app-search");
    if (searchEl) {
      searchEl.focus();
      searchEl.value = value;
      searchEl.setSelectionRange(value.length, value.length);
    }
  };

  window.appToggleFav = function(clusterId, index) {
    var cluster = DATA.clusters.find(function(c) { return c.id === clusterId; });
    if (cluster) {
      toggleFavorite(clusterId, index, cluster.reframings[index]);
    }
  };

  // ====== INIT ======
  render();
})();
</script>
